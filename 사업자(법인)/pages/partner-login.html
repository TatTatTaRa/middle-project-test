<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — 파트너센터</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo">✦ 파트너센터</div>
      <div class="sub">호텔 운영 중개 플랫폼 사업자 포털</div>
    </div>
    <div class="auth-title">로그인</div>
    <div class="auth-subtitle">등록된 사업자 계정으로 로그인하세요.</div>
    <div class="form-group">
      <label class="form-label">이메일</label>
      <input type="email" class="form-control" placeholder="이메일 주소 입력" value="partner@hotel.com">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input type="password" class="form-control" placeholder="비밀번호 입력" value="••••••••">
    </div>
    <div class="flex justify-between items-center mb-4" style="margin-bottom:20px">
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-600);cursor:pointer">
        <input type="checkbox" checked> 로그인 상태 유지
      </label>
      <a href="#" style="font-size:12px;color:var(--primary)">비밀번호 찾기</a>
    </div>
    <a href="partner-dashboard.html"><button class="btn btn-primary btn-full btn-lg">로그인</button></a>
    <div class="auth-footer">
      계정이 없으신가요? <a href="partner-register.html">사업자 회원가입</a>
    </div>
    <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--gray-200);text-align:center">
      <a href="admin-login.html" style="font-size:12px;color:var(--gray-400)">슈퍼 어드민으로 이동 →</a>
    </div>
  </div>
</div>
</body>
</html>
