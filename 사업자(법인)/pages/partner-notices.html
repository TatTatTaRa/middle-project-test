<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공지사항 — 파트너센터</title>
<link rel="stylesheet" href="shared.css">
<style>
.notice-list { display: flex; flex-direction: column; }
.notice-row { display: flex; align-items: center; gap: 16px; padding: 14px 20px; border-bottom: 1px solid var(--gray-100); cursor: pointer; transition: background 0.1s; }
.notice-row:hover { background: var(--gray-50); }
.notice-row:last-child { border-bottom: none; }
.notice-type { min-width: 60px; text-align: center; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
.nt-notice { background: var(--danger-light); color: var(--danger); }
.nt-update { background: var(--info-light); color: var(--info); }
.nt-event { background: var(--primary-light); color: var(--primary); }
.notice-title { flex: 1; font-size: 13px; color: var(--gray-800); }
.notice-title.unread { font-weight: 700; }
.notice-meta { font-size: 11px; color: var(--gray-400); white-space: nowrap; }
.new-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; flex-shrink: 0; }
.detail-wrap { display: none; }
.detail-wrap.active { display: block; }
</style>
</head>
<body>
<div class="layout">
  <div class="main">
    <header class="header">
      <div class="header-left"><div class="header-title">공지사항</div></div>
      <div class="header-right">
        <div class="header-date"></div>
        <button class="btn-icon">🔔</button>
        <div class="avatar">P</div>
      </div>
    </header>
    <div class="page">

      <!-- List View -->
      <div id="listView">
        <div class="page-header">
          <div class="page-header-left"><div class="page-title">공지사항</div></div>
          <div class="search-box"><input type="text" placeholder="공지 검색..."></div>
        </div>

        <div class="card" style="padding:0">
          <div style="padding:10px 20px;border-bottom:1px solid var(--gray-200)">
            <div class="tabs" style="margin-bottom:0;border-bottom:none">
              <div class="tab active">전체</div>
              <div class="tab">공지</div>
              <div class="tab">업데이트</div>
              <div class="tab">이벤트</div>
            </div>
          </div>
          <div class="notice-list" id="noticeList"></div>
        </div>
        <div class="pagination" style="margin-top:16px">
          <div class="pg-btn">‹</div>
          <div class="pg-btn active">1</div>
          <div class="pg-btn">2</div>
          <div class="pg-btn">3</div>
          <div class="pg-btn">›</div>
        </div>
      </div>

      <!-- Detail View -->
      <div id="detailView" class="detail-wrap">
        <div class="page-header">
          <button class="btn btn-ghost btn-sm" onclick="showList()">← 목록으로</button>
        </div>
        <div class="card">
          <div style="padding-bottom:16px;border-bottom:1px solid var(--gray-200);margin-bottom:16px">
            <div style="font-size:11px;color:var(--primary);font-weight:700;margin-bottom:8px">📢 공지</div>
            <div style="font-size:20px;font-weight:700;margin-bottom:8px" id="detailTitle"></div>
            <div style="font-size:12px;color:var(--gray-400)">작성일: <span id="detailDate"></span> &nbsp;·&nbsp; 작성자: 운영팀 &nbsp;·&nbsp; 조회수: 1,245</div>
          </div>
          <div id="detailContent" style="font-size:14px;line-height:1.8;color:var(--gray-700)"></div>
          <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--gray-200)">
            <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--gray-400)">
              <div id="prevNotice"></div>
              <div id="nextNotice"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<script src="shared.js"></script>
<script>
initPage('partner', 'notices', '공지사항');

const notices = [
  { type:'notice', title:'[공지] 2024년 추석 연휴 운영팀 근무 일정 안내', date:'2024.08.20', unread:true,
    content:`<p>안녕하세요, 파트너센터 운영팀입니다.</p>
    <p>2024년 추석 연휴 동안 파트너님의 원활한 운영을 지원하기 위해 운영팀 근무 일정을 아래와 같이 안내드립니다.</p>
    <h3>1. 연휴 기간 및 운영 안내</h3>
    <table border="1" style="border-collapse:collapse;width:100%;font-size:13px;margin:12px 0">
      <tr style="background:var(--gray-50)"><th style="padding:8px">구분</th><th style="padding:8px">날짜</th><th style="padding:8px">운영 시간</th><th style="padding:8px">비고</th></tr>
      <tr><td style="padding:8px">추석 연휴 전날</td><td style="padding:8px">2024.09.13 (금)</td><td style="padding:8px">09:00 ~ 18:00</td><td style="padding:8px">정상 운영</td></tr>
      <tr><td style="padding:8px" colspan="1"><strong style="color:var(--primary)">추석 연휴 기간</strong></td><td style="padding:8px">2024.09.14 (토) ~ 09.18 (수)</td><td style="padding:8px">10:00 ~ 17:00</td><td style="padding:8px" style="color:var(--danger)">비상 담당제</td></tr>
      <tr><td style="padding:8px">업무 재개일</td><td style="padding:8px">2024.09.19 (목)</td><td style="padding:8px">09:00 ~ 18:00</td><td style="padding:8px">정상 운영</td></tr>
    </table>
    <h3>2. 주요 업무 지원 안내</h3>
    <ul style="line-height:2">
      <li>급한 예약/취소: 평일 전화 1670-6250, 10:00~17:00</li>
      <li>정산 관련 문의: 정산 답변은 09월 13일 금요일까지</li>
      <li>쿠폰/프로모션: 관리자 기능을 통해 24시간 신청 가능</li>
    </ul>
    <p>불편을 드려 죄송하며, 파트너님 가정에 풍요로운 한가위 보내시기 바랍니다.</p>` },
  { type:'update', title:'[업데이트] 파트너센터 4차 파트너 시스템 안정화 안내', date:'2024.09.18', unread:true,
    content:'<p>안정화 업데이트가 완료되었습니다. 새로운 기능을 이용해 주세요.</p>' },
  { type:'event', title:'[이벤트] 가을 여행 시즌 파트너 프로모션 이벤트 안내', date:'2024.09.10', unread:false,
    content:'<p>가을 여행 시즌을 맞아 파트너 프로모션 이벤트를 진행합니다.</p>' },
  { type:'notice', title:'[공지] 수수료 정책 변경 안내 (10월 적용)', date:'2024.09.05', unread:false,
    content:'<p>10월부터 수수료 정책이 변경됩니다. 자세한 내용을 확인하세요.</p>' },
  { type:'update', title:'[업데이트] 리뷰 관리 기능 개선 안내', date:'2024.09.01', unread:false,
    content:'<p>리뷰 관리 기능이 개선되었습니다.</p>' },
  { type:'notice', title:'[공지] 파트너센터 이용약관 개정 안내', date:'2024.08.28', unread:false,
    content:'<p>이용약관이 개정되었습니다.</p>' },
];

const typeLabel = { notice:'nt-notice', update:'nt-update', event:'nt-event' };
const typeText = { notice:'공지', update:'업데이트', event:'이벤트' };

document.getElementById('noticeList').innerHTML = notices.map((n, i) => `
  <div class="notice-row" onclick="showDetail(${i})">
    <span class="notice-type ${typeLabel[n.type]}">${typeText[n.type]}</span>
    ${n.unread ? '<div class="new-dot"></div>' : ''}
    <div class="notice-title ${n.unread?'unread':''}">${n.title}</div>
    <div class="notice-meta">${n.date}</div>
    <span style="color:var(--gray-300);font-size:16px">›</span>
  </div>
`).join('');

function showDetail(idx) {
  const n = notices[idx];
  document.getElementById('detailTitle').textContent = n.title;
  document.getElementById('detailDate').textContent = n.date;
  document.getElementById('detailContent').innerHTML = n.content;
  document.getElementById('prevNotice').innerHTML = idx > 0 ? `‹ 이전: ${notices[idx-1].title.substring(0,20)}...` : '';
  document.getElementById('nextNotice').innerHTML = idx < notices.length-1 ? `다음: ${notices[idx+1].title.substring(0,20)}... ›` : '';
  document.getElementById('listView').style.display = 'none';
  document.getElementById('detailView').classList.add('active');
}

function showList() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('detailView').classList.remove('active');
}
</script>
</body>
</html>
