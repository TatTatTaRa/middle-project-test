<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예약 목록 관리 — 파트너센터</title>
  <link rel="stylesheet" href="shared.css">
</head>

<body>
  <div class="layout">
    <div class="main">
      <header class="header">
        <div class="header-left">
          <div class="header-title">예약 목록 관리</div>
        </div>
        <div class="header-right">
          <div class="header-date"></div>
          <button class="btn-icon">🔔<span class="notification-dot"></span></button>
          <div class="avatar">P</div>
        </div>
      </header>
      <div class="page">

        <div class="page-header">
          <div class="page-header-left">
            <div class="page-title">예약 목록 관리</div>
            <div class="page-subtitle">전화·현장 취소/변경 요청 시 상세를 확인한 뒤 수정 또는 취소합니다.</div>
          </div>
          <div class="flex gap-2">
            <a href="partner-reservations-calendar.html"><button class="btn btn-ghost btn-sm">📅 캘린더 뷰</button></a>
            <a href="partner-reservations.html"><button class="btn btn-ghost btn-sm">📋 승인 대기</button></a>
          </div>
        </div>

        <!-- Filter -->
        <div class="card" style="padding:16px;margin-bottom:16px">
          <div class="filter-bar">
            <input type="date" value="2026-03-01" id="dateFrom">
            <input type="date" value="2026-03-31" id="dateTo">
            <select id="filterStatus">
              <option value="active">전체 활성 예약</option>
              <option value="pending">예약 대기</option>
              <option value="unassigned">미배정</option>
              <option value="assigned">배정 완료</option>
              <option value="completed">이용 완료</option>
              <option value="cancelled">취소</option>
            </select>
            <div class="search-box ml-auto">
              <input type="text" id="searchInput" placeholder="예약자명 · 연락처 · 예약번호...">
            </div>
            <button class="btn btn-primary btn-sm" onclick="renderManage()">조회</button>
          </div>
        </div>

        <!-- Table -->
        <div class="card" style="padding:0">
          <div style="padding:16px 20px;border-bottom:1px solid var(--gray-200)">
            <span style="font-size:13px" id="manageCountText">전체 <strong>0건</strong></span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>예약번호</th>
                  <th>예약자</th>
                  <th>연락처</th>
                  <th>객실</th>
                  <th>배정 호실</th>
                  <th>입실일</th>
                  <th>퇴실일</th>
                  <th>상태</th>
                  <th>관리</th>
                </tr>
              </thead>
              <tbody id="manageRows"></tbody>
            </table>
          </div>
          <div style="padding:12px 20px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end">
            <div class="pagination">
              <div class="pg-btn">‹</div>
              <div class="pg-btn active">1</div>
              <div class="pg-btn">2</div>
              <div class="pg-btn">3</div>
              <div class="pg-btn">›</div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- 상세 보기 모달 -->
  <div class="modal-overlay hidden" id="modalDetail">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div class="modal-title">📅 예약 상세 정보</div>
        <button class="modal-close">×</button>
      </div>
      <div class="modal-body">

        <!-- 예약번호 + 상태 -->
        <div class="form-group">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div>
              <div style="font-size:11px;color:var(--gray-400);margin-bottom:3px">예약번호</div>
              <div style="font-size:14px;font-weight:700;color:var(--gray-700)" id="detailId"></div>
            </div>
            <div id="detailStatusBadge"></div>
          </div>
        </div>

        <!-- 예약자 정보 -->
        <div class="form-group">
          <div class="form-label" style="display:flex;align-items:center;gap:6px">👤 예약자 정보</div>
          <div class="form-row">
            <div><label class="form-label">예약자명</label><input class="form-control" id="detailName"></div>
            <div><label class="form-label">연락처</label><input class="form-control" id="detailPhone"></div>
          </div>
        </div>

        <!-- 객실 정보 -->
        <div class="form-group">
          <div class="form-label" style="display:flex;align-items:center;gap:6px">🛏️ 객실 정보</div>
          <div
            style="background:var(--gray-50);border-radius:var(--radius);padding:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-weight:600;margin-bottom:6px" id="detailRoom"></div>
              <div style="font-size:13px;color:var(--gray-700)" id="detailAssignedRoom"></div>
            </div>
            <a href="partner-reservations-calendar.html" class="btn btn-primary btn-sm"
              style="text-decoration:none;white-space:nowrap;box-shadow:none">객실 배정 보드 👉</a>
          </div>
        </div>

        <!-- 일정 + 인원 -->
        <div class="form-group">
          <div class="form-label">📆 일정 및 인원</div>
          <div class="form-row" style="margin-bottom:12px">
            <div><label class="form-label">입실 일시</label><input class="form-control" type="datetime-local"
                id="detailCheckin"></div>
            <div><label class="form-label">퇴실 일시</label><input class="form-control" type="datetime-local"
                id="detailCheckout"></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="flex:0 0 100px">
              <label class="form-label">인원</label>
              <input class="form-control" type="number" min="1" max="10" id="detailGuests">
            </div>
            <span style="font-size:12px;color:var(--gray-400);margin-top:18px">인</span>
          </div>
        </div>

        <!-- 요청사항 -->
        <div class="form-group">
          <label class="form-label">💬 요청사항</label>
          <textarea class="form-control" id="detailRequest" rows="3" style="resize:vertical"></textarea>
        </div>

      </div>
      <div class="modal-footer" style="justify-content:space-between" id="detailFooter">
        <button class="btn btn-sm" id="btnCancelResv"
          style="color:var(--danger);border:1.5px solid var(--danger);background:transparent"
          onclick="cancelFromModal()">예약 취소</button>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" data-modal-close>닫기</button>
          <button class="btn btn-primary" id="btnSave" onclick="saveDetail()">변경사항 저장</button>
        </div>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    initPage('partner', 'manage', '예약 목록 관리');

    // ──────────────────────────────────────────
    // 상태 정의
    // assignedRoom: null → 미배정, 문자열 → 배정완료
    // status: pending | confirmed | completed | cancelled
    // ──────────────────────────────────────────
    const manageData = [
      { id: '20260310-0042', name: '김민준', phone: '010-1234-5678', room: '디럭스 트윈', assignedRoom: '302호', checkin: '2026-03-20T15:00', checkout: '2026-03-22T11:00', status: 'confirmed', guests: 2, request: '' },
      { id: '20260308-0019', name: '이서연', phone: '010-9876-5432', room: '스탠다드 더블', assignedRoom: null, checkin: '2026-03-18T15:00', checkout: '2026-03-19T11:00', status: 'confirmed', guests: 1, request: '조용한 방 요청' },
      { id: '20260312-0077', name: '박도윤', phone: '010-5553-4444', room: '프리미어 스위트', assignedRoom: '501호', checkin: '2026-03-25T15:00', checkout: '2026-03-27T11:00', status: 'confirmed', guests: 3, request: '생일 이벤트 준비 요청' },
      { id: '20260309-0055', name: '최지우', phone: '010-7777-8888', room: '계곡뷰 A', assignedRoom: null, checkin: '2026-03-22T15:00', checkout: '2026-03-24T11:00', status: 'confirmed', guests: 2, request: '' },
      { id: '20260314-0003', name: '정하은', phone: '010-3333-2222', room: '숲속 B', assignedRoom: null, checkin: '2026-03-18T15:00', checkout: '2026-03-20T11:00', status: 'pending', guests: 2, request: '' },
      { id: '20260307-0061', name: '윤서아', phone: '010-1111-9999', room: '힐링 E', assignedRoom: '203호', checkin: '2026-03-28T15:00', checkout: '2026-03-30T11:00', status: 'confirmed', guests: 2, request: '알레르기 (복숭아)' },
      { id: '20260315-0021', name: '한지민', phone: '010-8888-1111', room: '하늘 F', assignedRoom: null, checkin: '2026-03-29T15:00', checkout: '2026-03-31T11:00', status: 'pending', guests: 3, request: '' },
      { id: '20260305-0034', name: '임준혁', phone: '010-4444-5555', room: '파노라마 C', assignedRoom: '401호', checkin: '2026-03-10T15:00', checkout: '2026-03-12T11:00', status: 'completed', guests: 1, request: '' },
      { id: '20260301-0088', name: '강현우', phone: '010-6666-7777', room: '계곡뷰 A', assignedRoom: null, checkin: '2026-03-05T15:00', checkout: '2026-03-07T11:00', status: 'cancelled', guests: 4, request: '' },
    ];

    // 배정 상태 판정
    function getAssignState(r) {
      if (r.status === 'pending') return 'pending';
      if (r.status === 'completed') return 'completed';
      if (r.status === 'cancelled') return 'cancelled';
      return r.assignedRoom ? 'assigned' : 'unassigned';
    }

    function assignBadge(r) {
      const s = getAssignState(r);
      if (s === 'assigned') return `<span class="badge badge-confirmed">배정완료</span>`;
      if (s === 'unassigned') return `<span class="badge badge-pending">미배정</span>`;
      if (s === 'pending') return `<span class="badge" style="background:var(--gray-100);color:var(--gray-500)">승인대기</span>`;
      if (s === 'completed') return `<span class="badge badge-completed">이용완료</span>`;
      if (s === 'cancelled') return `<span class="badge badge-cancelled">취소</span>`;
    }

    function isActive(r) {
      return r.status !== 'completed' && r.status !== 'cancelled';
    }

    let currentDetailIdx = null;

    function renderManage() {
      const filterVal = document.getElementById('filterStatus').value;
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

      const filtered = manageData.filter(r => {
        const s = getAssignState(r);
        if (filterVal === 'active' && !isActive(r)) return false;
        if (filterVal === 'pending' && s !== 'pending') return false;
        if (filterVal === 'unassigned' && s !== 'unassigned') return false;
        if (filterVal === 'assigned' && s !== 'assigned') return false;
        if (filterVal === 'completed' && s !== 'completed') return false;
        if (filterVal === 'cancelled' && s !== 'cancelled') return false;
        if (keyword &&
          !r.id.toLowerCase().includes(keyword) &&
          !r.name.toLowerCase().includes(keyword) &&
          !r.phone.includes(keyword)) return false;
        return true;
      });

      document.getElementById('manageCountText').innerHTML = `전체 <strong>${filtered.length}건</strong>`;

      document.getElementById('manageRows').innerHTML = filtered.map((r, i) => {
        const assignedCell = r.assignedRoom
          ? `<span style="background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700">${r.assignedRoom}</span>`
          : `<span style="font-size:12px;color:var(--gray-400)">—</span>`;

        return `
      <tr>
        <td style="font-size:12px;color:var(--gray-600)">${r.id}</td>
        <td style="font-weight:600">${r.name}</td>
        <td style="font-size:12px;color:var(--gray-500)">${r.phone}</td>
        <td>${r.room}</td>
        <td>${assignedCell}</td>
        <td style="font-size:13px">${r.checkin.slice(0, 10)}</td>
        <td style="font-size:13px">${r.checkout.slice(0, 10)}</td>
        <td>${assignBadge(r)}</td>
        <td><button class="btn btn-outline btn-sm" onclick="openDetail(${i})">상세 보기</button></td>
      </tr>
    `;
      }).join('');

      window._filteredManage = filtered;
    }

    function openDetail(idx) {
      const r = window._filteredManage[idx];
      currentDetailIdx = idx;
      const readonly = !isActive(r);

      document.getElementById('detailId').textContent = r.id;
      document.getElementById('detailStatusBadge').innerHTML = assignBadge(r);
      document.getElementById('detailName').value = r.name;
      document.getElementById('detailPhone').value = r.phone;
      document.getElementById('detailRoom').textContent = r.room;
      document.getElementById('detailCheckin').value = r.checkin;
      document.getElementById('detailCheckout').value = r.checkout;
      document.getElementById('detailGuests').value = r.guests;
      document.getElementById('detailRequest').value = r.request;

      // 배정 호실 표시
      const assignEl = document.getElementById('detailAssignedRoom');
      assignEl.innerHTML = r.assignedRoom
        ? `배정 호실: <span style="font-weight:700;color:var(--primary);background:var(--primary-light);padding:2px 8px;border-radius:4px;margin-left:4px">${r.assignedRoom}</span>`
        : `<span style="color:var(--gray-400);font-size:13px">배정 호실 없음 (미배정)</span>`;

      // 수정 불가 필드 처리
      ['detailName', 'detailPhone', 'detailCheckin', 'detailCheckout', 'detailGuests', 'detailRequest'].forEach(id => {
        document.getElementById(id).readOnly = readonly;
        document.getElementById(id).style.background = readonly ? 'var(--gray-100)' : '';
      });

      // 하단 버튼 처리
      const btnCancel = document.getElementById('btnCancelResv');
      const btnSave = document.getElementById('btnSave');
      btnCancel.disabled = readonly;
      btnSave.disabled = readonly;
      if (readonly) {
        btnCancel.style.opacity = '.4';
        btnSave.style.opacity = '.4';
      } else {
        btnCancel.style.opacity = '';
        btnSave.style.opacity = '';
      }

      document.getElementById('modalDetail').classList.remove('hidden');
    }

    function saveDetail() {
      showAlert('변경사항이 저장되었습니다.', { icon: '✅', title: '저장 완료' });
      document.getElementById('modalDetail').classList.add('hidden');
    }

    function cancelFromModal() {
      const r = window._filteredManage[currentDetailIdx];
      showConfirm(
        `${r.name}님의 예약(${r.id})을 취소하시겠습니까?\n취소 후 환불 절차가 진행됩니다.`,
        () => {
          r.status = 'cancelled';
          r.assignedRoom = null;
          document.getElementById('modalDetail').classList.add('hidden');
          renderManage();
          showAlert('취소 처리가 완료되었습니다.', { icon: '✅', title: '취소 완료' });
        },
        { icon: '⚠️', title: '예약 취소 확인', confirmText: '취소 처리', confirmClass: 'btn-danger' }
      );
    }

    renderManage();
  </script>
</body>

</html>
