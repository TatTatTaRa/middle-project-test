<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예약 변경 로그 — 파트너센터</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* diff styles */
    .diff-inline {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      background: var(--gray-50);
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 2px;
    }

    .diff-before {
      color: var(--danger);
      text-decoration: line-through;
      opacity: 0.8;
    }

    .diff-arrow {
      color: var(--gray-400);
      font-size: 11px;
    }

    .diff-after {
      color: var(--primary);
      font-weight: 600;
    }

    /* highight recent */
    .row-recent {
      background-color: var(--primary-light);
    }
  </style>
</head>

<body>
  <div class="layout">
    <div class="main">
      <header class="header">
        <div class="header-left">
          <div class="header-title">예약 변경 이력 추적</div>
        </div>
        <div class="header-right">
          <div class="header-date"></div>
          <button class="btn-icon">🔔<span class="notification-dot"></span></button>
          <div class="avatar">P</div>
        </div>
      </header>
      <div class="page">

        <div class="page-header">
          <div class="page-header-left">
            <div class="page-title">예약 변경 이력 추적</div>
            <div class="page-subtitle">잘못 수정된 예약 내역을 빠르게 찾아내고 복구할 수 있습니다.</div>
          </div>
          <div class="flex gap-2">
            <a href="partner-reservations.html"><button class="btn btn-ghost btn-sm">📋 예약 리스트</button></a>
          </div>
        </div>

        <!-- Quick Filters / Audit focus -->
        <div class="stat-grid" style="grid-template-columns: repeat(2, 1fr); margin-bottom: 16px;">
          <div class="stat-card" style="cursor: pointer; border: 2px solid var(--primary);" onclick="filterRecent(1)">
            <div class="stat-label"><span class="stat-dot" style="background:#3B82F6"></span>방금 수정 (1시간 이내)</div>
            <div class="stat-value info" id="countRecent1h">2</div>
            <div class="stat-sub">건</div>
          </div>
          <div class="stat-card" style="cursor: pointer;" onclick="filterRecent(24)">
            <div class="stat-label"><span class="stat-dot" style="background:#F59E0B"></span>오늘 수정 (24시간 이내)</div>
            <div class="stat-value warning" id="countRecent24h">4</div>
            <div class="stat-sub">건</div>
          </div>
        </div>

        <!-- Filter -->
        <div class="card" style="padding:16px;margin-bottom:16px">
          <div class="filter-bar">
            <input type="date" id="filterDateFrom" value="2026-03-01">
            <input type="date" id="filterDateTo" value="2026-03-15">
            <select id="filterType">
              <option value="">전체 변경 유형</option>
              <option value="date">날짜 변경</option>
              <option value="room">객실 변경</option>
              <option value="guests">인원 변경</option>
              <option value="status">상태 변경</option>
              <option value="request">요청사항 변경</option>
              <option value="cancel">예약 취소</option>
            </select>
            <div class="search-box ml-auto">
              <input type="text" id="searchInput" placeholder="예약번호 또는 예약자명...">
            </div>
            <button class="btn btn-primary btn-sm" onclick="renderLogs()">조회</button>
            <button class="btn btn-outline btn-sm" onclick="resetFilters()">초기화</button>
          </div>
        </div>

        <!-- Table -->
        <div class="card" style="padding:0">
          <div
            style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-200)">
            <div style="font-size:13px" id="logCountText">조회 결과 <strong>0건</strong></div>
            <div style="font-size:12px;color:var(--gray-500)"><span
                style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--primary-light);margin-right:4px;"></span>방금
              변경된 항목 하이라이트</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>변경 일시</th>
                  <th>예약 정보</th>
                  <th>변경 내용 (기존 ➔ 변경)</th>
                  <th>유형</th>
                  <th>처리자</th>
                </tr>
              </thead>
              <tbody id="logRows"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 변경 상세 모달 -->
  <div class="modal-overlay hidden" id="modalLogDetail">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div class="modal-title">📝 변경 상세 내역</div>
        <button class="modal-close">×</button>
      </div>
      <div class="modal-body" id="logDetailBody"></div>
      <div class="modal-footer">
        <!-- 추후 복구하기 버튼 등 추가 가능 -->
        <button class="btn btn-primary" onclick="alert('이 변경사항을 되돌리는 복구 기능은 준비 중입니다.');">이전 상태로 복구 (준비중)</button>
        <button class="btn btn-ghost" data-modal-close>닫기</button>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    initPage('partner', 'logs', '변경 로그 추적');

    const typeMap = {
      created: { label: '예약 생성', cls: 'badge-confirmed' },
      date: { label: '날짜 변경', cls: 'badge-pending' },
      room: { label: '객실 변경', cls: 'badge-pending' },
      guests: { label: '인원 변경', cls: 'badge-pending' },
      status: { label: '상태 변경', cls: 'badge-using' },
      request: { label: '요청사항', cls: 'badge-pending' },
      cancel: { label: '예약 취소', cls: 'badge-cancelled' },
    };

    const actorMap = {
      partner: '사업자(나)',
      customer: '고객 본인',
      system: '시스템 자동',
    };

    // 가상의 시간 기준: 현재 2026-03-15 13:17
    const logData = [
      {
        datetime: '2026-03-15 13:10', id: '20260308-0019', name: '이서연', phone: '010-1234-5678', room: '스탠다드 더블',
        type: 'status', actor: 'partner', isRecent: true,
        before: { '상태': '예약대기' },
        after: { '상태': '예약취소' }, // 잘못 누른 상황 시뮬레이션
      },
      {
        datetime: '2026-03-15 12:45', id: '20260312-0077', name: '박도윤', phone: '010-5555-4444', room: '프리미어 스위트',
        type: 'guests', actor: 'partner', isRecent: true,
        before: { '인원': '2인', '요청사항': '(없음)' },
        after: { '인원': '1인', '요청사항': '아기침대 취소' },
      },
      {
        datetime: '2026-03-14 17:20', id: '20260309-0055', name: '최지우', phone: '010-7777-8888', room: '계곡뷰 A',
        type: 'room', actor: 'partner', isRecent: false,
        before: { '배정객실': '미배정' },
        after: { '배정객실': '201호' },
      },
      {
        datetime: '2026-03-14 14:32', id: '20260310-0042', name: '김민준', phone: '010-9999-0000', room: '디럭스 트윈',
        type: 'date', actor: 'customer', isRecent: false,
        before: { '입실': '2026-03-20', '퇴실': '2026-03-22' },
        after: { '입실': '2026-03-21', '퇴실': '2026-03-23' },
      },
      {
        datetime: '2026-03-13 10:30', id: '20260307-0061', name: '윤서아', phone: '010-1111-2222', room: '힐링 E',
        type: 'request', actor: 'customer', isRecent: false,
        before: { '요청사항': '(없음)' },
        after: { '요청사항': '어린이 침대 추가 요청 부탁드립니다.' },
      }
    ];

    let selectedLog = null;
    let currentHourFilter = 0; // 0 = all

    function resetFilters() {
      document.getElementById('filterType').value = '';
      document.getElementById('searchInput').value = '';
      document.getElementById('filterDateFrom').value = '2026-03-01';
      document.getElementById('filterDateTo').value = '2026-03-15';
      currentHourFilter = 0;

      // reset stat card borders
      document.querySelectorAll('.stat-card').forEach(c => c.style.border = '1px solid var(--gray-200)');
      renderLogs();
    }

    function filterRecent(hours) {
      // unselect all
      document.querySelectorAll('.stat-card').forEach(c => c.style.border = '1px solid var(--gray-200)');

      if (currentHourFilter === hours) {
        // toggle off
        currentHourFilter = 0;
      } else {
        currentHourFilter = hours;
        event.currentTarget.style.border = '2px solid var(--primary)';
      }
      renderLogs();
    }

    function buildDiffHtml(beforeObj, afterObj) {
      const keys = [...new Set([...Object.keys(beforeObj || {}), ...Object.keys(afterObj || {})])];
      if (keys.length === 0) return '<span style="color:var(--gray-400)">변경 내역 없음</span>';

      return keys.map(k => {
        const b = beforeObj[k] || '(없음)';
        const a = afterObj[k] || '(삭제)';
        if (b === a) return ''; // no diff
        return `
      <div class="diff-inline">
        <span style="font-size:11px;font-weight:600;color:var(--gray-600);margin-right:4px">[${k}]</span>
        <span class="diff-before">${b}</span>
        <span class="diff-arrow">➔</span>
        <span class="diff-after">${a}</span>
      </div>
    `;
      }).join('<br/>');
    }

    function renderLogs() {
      const typeFilter = document.getElementById('filterType').value;
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

      const filtered = logData.filter(l => {
        if (typeFilter && l.type !== typeFilter) return false;
        if (keyword && !l.id.toLowerCase().includes(keyword) && !l.name.toLowerCase().includes(keyword) && !l.phone.includes(keyword)) return false;

        // 단순 시뮬레이션을 위한 필터 적용 (실제로는 datetime 파싱 필요)
        if (currentHourFilter === 1 && !l.isRecent) return false;
        if (currentHourFilter === 24 && l.datetime.indexOf('2026-03-15') === -1) return false;

        return true;
      });

      document.getElementById('logCountText').innerHTML = `조회 결과 <strong>${filtered.length}건</strong>`;

      document.getElementById('logRows').innerHTML = filtered.map((l, i) => {
        const t = typeMap[l.type];
        const diffHtml = buildDiffHtml(l.before, l.after);
        const rowClass = l.isRecent ? 'row-recent' : '';

        return `
      <tr class="${rowClass}" style="cursor:pointer" onclick="openLogDetail(${i})">
        <td style="font-size:12px;color:var(--gray-600);white-space:nowrap">${l.datetime}</td>
        <td>
          <div style="font-weight:600">${l.name} <span style="font-size:11px;font-weight:400;color:var(--gray-500)">(${l.phone})</span></div>
          <div style="font-size:12px;color:var(--gray-500)">${l.room} · ${l.id}</div>
        </td>
        <td style="max-width:300px">${diffHtml}</td>
        <td><span class="badge ${t.cls}">${t.label}</span></td>
        <td style="font-size:12px;font-weight:600;color:var(--gray-700)">${actorMap[l.actor] || l.actor}</td>
      </tr>
    `;
      }).join('');

      window._filteredLogs = filtered;
    }

    function openLogDetail(idx) {
      const l = window._filteredLogs[idx];
      if (!l) return;
      const t = typeMap[l.type];
      const keys = [...new Set([...Object.keys(l.before), ...Object.keys(l.after)])];

      const rowsHtml = keys.map(k => {
        const b = l.before[k] || '(데이터 없음)';
        const a = l.after[k] || '(데이터 없음)';
        const isChanged = b !== a;

        // 모달 내 큰 뷰에서의 diff 표시
        return `
      <div style="background:#fff;border:1px solid ${isChanged ? 'var(--primary-light)' : 'var(--gray-200)'};border-radius:8px;padding:12px;margin-bottom:8px">
        <div style="font-size:12px;font-weight:700;color:var(--gray-600);margin-bottom:8px">${k}</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="flex:1;background:var(--gray-50);padding:10px;border-radius:6px;${isChanged ? 'color:var(--danger);text-decoration:line-through' : 'color:var(--gray-600)'}">${b}</div>
          <div style="font-size:20px;color:var(--gray-300)">➔</div>
          <div style="flex:1;background:var(--primary-light);padding:10px;border-radius:6px;${isChanged ? 'color:var(--primary);font-weight:700' : 'color:var(--gray-600)'}">${a}</div>
        </div>
      </div>
    `;
      }).join('');

      document.getElementById('logDetailBody').innerHTML = `
    <div style="margin-bottom:20px">
      <div style="font-size:18px;font-weight:700">${l.name} 고객님의 예약 정보가 변경되었습니다.</div>
      <div style="font-size:13px;color:var(--gray-500);margin-top:4px">${l.datetime} · 처리자: ${actorMap[l.actor]}</div>
    </div>
    <div style="background:var(--gray-50);padding:16px;border-radius:8px">
      ${rowsHtml}
    </div>
  `;

      document.getElementById('modalLogDetail').classList.remove('hidden');
    }

    renderLogs();
  </script>
</body>

</html>
