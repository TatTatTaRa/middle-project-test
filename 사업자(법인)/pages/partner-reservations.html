<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약 관리 — 파트너센터</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="layout">
  <div class="main">
    <header class="header">
      <div class="header-left"><div class="header-title">예약 관리</div></div>
      <div class="header-right">
        <div class="header-date"></div>
        <button class="btn-icon">🔔<span class="notification-dot"></span></button>
        <div class="avatar">P</div>
      </div>
    </header>
    <div class="page">

      <div class="page-header">
        <div class="page-header-left">
          <div class="page-title">통합 예약 리스트</div>
        </div>
        <div class="flex gap-2">
          <a href="partner-reservations-calendar.html"><button class="btn btn-ghost btn-sm">📅 캘린더 뷰</button></a>
          <button class="btn btn-primary btn-sm">+ 예약 등록</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:#F59E0B"></span>예약 대기</div><div class="stat-value warning">8</div></div>
        <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:#3B82F6"></span>예약 확정</div><div class="stat-value info">23</div></div>
        <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:#EF4444"></span>예약 취소</div><div class="stat-value danger">2</div></div>
        <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:#10B981"></span>이용 완료</div><div class="stat-value success">87</div></div>
      </div>

      <!-- Filter -->
      <div class="card" style="padding:16px;margin-bottom:16px">
        <div class="filter-bar">
          <select><option>일별</option><option>주별</option><option>월별</option></select>
          <input type="date" value="2026-03-01">
          <input type="date" value="2026-03-31">
          <select><option>전체 상태</option><option>예약 대기</option><option>예약 확정</option><option>이용 완료</option><option>예약 취소</option></select>
          <select><option>전체 객실</option><option>계곡뷰 A</option><option>숲속 B</option><option>파노라마 C</option></select>
          <div class="search-box ml-auto">
            <input type="text" placeholder="예약자명 또는 예약번호...">
          </div>
          <button class="btn btn-primary btn-sm">조회</button>
        </div>
      </div>

      <!-- Table -->
      <div class="card" style="padding:0">
        <!-- 탭 영역 추가 -->
        <div style="padding:14px 20px;border-bottom:1px solid var(--gray-200)">
          <div class="tabs" style="margin-bottom:0;border-bottom:none" id="resvTabs">
            <div class="tab active" data-tab="pending">승인 대기 (신규 요청)</div>
            <div class="tab" data-tab="confirmed">확정 예약 관리</div>
          </div>
        </div>
        
        <div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-200)">
          <div style="font-size:13px" id="resvCountText">전체 <strong>120건</strong> &nbsp;<span style="color:var(--gray-400)">· 예약 대기(8) · 예약확정(23) · 예약취소(2)</span></div>
          <div style="font-size:12px;color:var(--gray-400)">10개씩 보기 ▾</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="reservationHead">
              <!-- 동적으로 컬럼 헤더가 들어갑니다 -->
            </thead>
            <tbody id="reservationRows"></tbody>
          </table>
        </div>
        <div style="padding:12px 20px;border-top:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between">
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost btn-sm">선택 승인</button>
            <button class="btn btn-ghost btn-sm">선택 취소</button>
          </div>
          <div class="pagination">
            <div class="pg-btn">‹</div>
            <div class="pg-btn active">1</div>
            <div class="pg-btn">2</div>
            <div class="pg-btn">3</div>
            <div class="pg-btn">4</div>
            <div class="pg-btn">5</div>
            <div class="pg-btn">›</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Reservation Detail Modal -->
<div class="modal-overlay hidden" id="modalDetail">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title">📅 예약 상세 정보 및 수정</div>
      <button class="modal-close">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <div class="form-label">예약 상태</div>
        <div style="background:var(--primary-light);border-radius:var(--radius);padding:12px 16px">
          <label class="form-label" style="margin-bottom:6px">현재 상태 관리</label>
          <select class="form-control"><option>예약확정</option><option>예약대기</option><option>이용중</option><option>이용완료</option><option>예약취소</option></select>
        </div>
      </div>
      <div class="form-group">
        <div class="form-label" style="display:flex;align-items:center;gap:6px">👤 예약자 정보</div>
        <div class="form-row">
          <div><label class="form-label">예약자명</label><input class="form-control" value="김철수"></div>
          <div><label class="form-label">연락처</label><input class="form-control" value="010-1234-5678"></div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-label" style="display:flex;align-items:center;gap:6px">🛏️ 예약 내역</div>
        <div style="background:var(--gray-50);border-radius:var(--radius);padding:12px;margin-bottom:12px">
          <label class="form-label">예약 번호 (수정 불가)</label>
          <input class="form-control" value="REV-20231024-00892" readonly style="background:var(--gray-100)">
        </div>
        <label class="form-label">상품명 및 객실 배정</label>
        <div style="background:var(--gray-50);border-radius:var(--radius);padding:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-weight:600;margin-bottom:6px">계곡뷰 A (Deluxe Twin)</div>
            <div style="font-size:13px;color:var(--gray-700)">배정 호실: <span style="font-weight:700;color:var(--primary);background:var(--primary-light);padding:2px 6px;border-radius:4px;margin-left:4px">305호</span></div>
          </div>
          <a href="partner-reservations-calendar.html" class="btn btn-primary btn-sm" style="text-decoration:none; white-space:nowrap; box-shadow:none;">객실 배정 보드로 이동 👉</a>
        </div>
        <div class="form-row">
          <div><label class="form-label">입실 일시</label><input class="form-control" type="datetime-local" value="2026-03-14T15:00"></div>
          <div><label class="form-label">퇴실 일시</label><input class="form-control" type="datetime-local" value="2026-03-16T11:00"></div>
        </div>
        <div class="mt-3">
          <label class="form-label">인원</label>
          <div style="display:flex;align-items:center;gap:8px">
            <input class="form-control" style="width:80px" value="2">
            <span style="font-size:12px;color:var(--gray-500)">(최소 1인 / 최대 4인)</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-label">💰 결제 정보</div>
        <div style="background:var(--gray-50);border-radius:var(--radius);padding:14px">
          <div class="flex justify-between mb-2"><span style="font-size:13px;color:var(--gray-600)">총 결제금액</span><span style="font-size:15px;font-weight:700">₩560,000</span></div>
          <div class="flex justify-between"><span style="font-size:13px;color:var(--gray-600)">결제 수단</span><span style="font-size:13px">신용카드</span></div>
        </div>
      </div>
    </div>
    <div class="modal-footer" style="justify-content:space-between">
      <button class="btn btn-outline" style="color:var(--danger);border-color:var(--danger)" onclick="showConfirm('예약을 거절/취소 처리하시겠습니까?', () => document.getElementById('modalDetail').classList.add('hidden'))">예약 취소(거절)</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" data-modal-close>닫기</button>
        <button class="btn btn-primary" onclick="showAlert('정보가 저장되었습니다.', {icon:'✅'})">변경사항 저장</button>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
initPage('partner', 'reservations', '예약 관리');

const resData = [
  { id:'20231015-0001', name:'김철수', phone:'010-1234-5678', room:'스탠다드 더블', assignedRoom: null, checkin:'10.20(월) 15:00', checkout:'10.21(화)', status:'pending', guests:2 },
  { id:'20231015-0042', name:'이영훈', phone:'010-9876-5432', room:'디럭스 트윈', assignedRoom: '302호', checkin:'10.22(수) 15:00', checkout:'10.23(목)', status:'confirmed', guests:2 },
  { id:'20231016-0125', name:'박지성', phone:'010-5553-4444', room:'프리미어 스위트', assignedRoom: null, checkin:'10.25(금) 15:00', checkout:'10.27(일)', status:'confirmed', guests:3 },
  { id:'20231017-0031', name:'최유진', phone:'010-7777-8888', room:'계곡뷰 A', assignedRoom: null, checkin:'10.26(토) 15:00', checkout:'10.28(월)', status:'pending', guests:2 },
  { id:'20231018-0019', name:'정민수', phone:'010-3333-2222', room:'숲속 B', assignedRoom: '101호', checkin:'10.28(월) 15:00', checkout:'10.29(화)', status:'completed', guests:4 },
  { id:'20231019-0007', name:'한미래', phone:'010-1111-9999', room:'파노라마 C', assignedRoom: null, checkin:'10.29(화) 15:00', checkout:'10.30(수)', status:'cancelled', guests:2 },
  { id:'20231020-0053', name:'강도현', phone:'010-4444-5555', room:'힐링 E', assignedRoom: '505호', checkin:'10.30(수) 15:00', checkout:'11.01(금)', status:'confirmed', guests:2 },
  { id:'20231021-0088', name:'윤지아', phone:'010-6666-7777', room:'하늘 F', assignedRoom: null, checkin:'11.01(금) 15:00', checkout:'11.02(토)', status:'pending', guests:3 },
];

const statusMap = {
  pending: '<span class="badge badge-pending">예약대기</span>',
  confirmed: '<span class="badge badge-confirmed">예약확정</span>',
  using: '<span class="badge badge-using">이용중</span>',
  completed: '<span class="badge badge-completed">이용완료</span>',
  cancelled: '<span class="badge badge-cancelled">취소</span>',
};

let currentTab = 'pending'; // 'pending' or 'confirmed'

function renderReservations() {
  const headEl = document.getElementById('reservationHead');
  const tbodyEl = document.getElementById('reservationRows');
  
  // 1. 상태에 따른 헤더 변경
  if (currentTab === 'pending') {
    headEl.innerHTML = `
      <tr>
        <th><input type="checkbox"></th>
        <th>예약 상태</th>
        <th>통합예약번호</th>
        <th>예약자</th>
        <th>상품명 / 인원</th>
        <th>입실 / 퇴실 일시</th>
        <th>관리 액션 (승인/거절)</th>
      </tr>
    `;
  } else {
    // 확정/완료된 예약 뷰
    headEl.innerHTML = `
      <tr>
        <th><input type="checkbox"></th>
        <th>예약 상태</th>
        <th>통합예약번호</th>
        <th>예약자</th>
        <th>상품명 / 배정 객실</th>
        <th>입실 / 퇴실 일시</th>
        <th>관리 액션</th>
      </tr>
    `;
  }

  // 2. 상태에 따른 데이터 필터링
  const filtered = resData.filter(r => {
    if (currentTab === 'pending') return r.status === 'pending';
    return r.status !== 'pending' && r.status !== 'cancelled';
  });
  
  document.getElementById('resvCountText').innerHTML = `전체 <strong>${filtered.length}건</strong> &nbsp;<span style="color:var(--gray-400)">· 현재 '${currentTab === 'pending' ? '승인 대기' : '확정 예약'}' 목록 조회 중</span>`;

  // 3. 로우 렌더링
  tbodyEl.innerHTML = filtered.map(r => {
    
    // 승인 탭 (액션 버튼)
    let actionHtml = '';
    let roomColHtml = '';
    
    if (currentTab === 'pending') {
      roomColHtml = `<div style="font-weight:500">${r.room}</div><div style="font-size:11px;color:var(--gray-500)">성인 ${r.guests}인</div>`;
      actionHtml = `
        <div style="display:flex;gap:4px">
          <button class="btn btn-outline btn-sm" onclick="showConfirm('예약을 승인하시겠습니까?\\n승인 후 객실 배정 탭으로 이동됩니다.', () => showAlert('결제 및 예약이 최종 확정되었습니다.', {icon:'✅'}))">승인</button>
          <button class="btn btn-danger btn-sm" onclick="showConfirm('예약을 거절하시겠습니까?\\n거절시 고객에게 100% 환불 처리됩니다.', () => showAlert('거절 처리 및 환불이 완료되었습니다.', {icon:'✅'}))">거절</button>
        </div>
      `;
    } else {
      // 확정 탭 (배정 및 액션 버튼)
      let roomBadge = r.assignedRoom ? `<span style="background:var(--primary-light);color:var(--primary);padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700">${r.assignedRoom} 배정완료</span>` : `<span style="background:var(--gray-100);color:var(--gray-500);padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600">미배정</span>`;
      
      roomColHtml = `
        <div style="font-weight:500;margin-bottom:4px">${r.room}</div>
        <div>${roomBadge}</div>
      `;
      
      actionHtml = `
        <button class="btn btn-outline btn-sm" data-modal="modalDetail">상세 보기</button>
      `;
    }

    return `
      <tr>
        <td><input type="checkbox"></td>
        <td>${statusMap[r.status]}</td>
        <td style="font-size:12px;color:var(--gray-600)">${r.id}</td>
        <td><div style="font-weight:600">${r.name}</div><div style="font-size:11px;color:var(--gray-500)">${r.phone}</div></td>
        <td>${roomColHtml}</td>
        <td style="font-size:12px">${r.checkin}<br><span style="color:var(--gray-400)">${r.checkout}</span></td>
        <td>${actionHtml}</td>
      </tr>
    `;
  }).join('');

  // 4. 모달 등 이벤트 바인딩 재호출
  document.querySelectorAll('[data-modal]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById(btn.getAttribute('data-modal'))?.classList.remove('hidden');
    });
  });
}

// 탭 이벤트 설정
document.querySelectorAll('#resvTabs .tab').forEach(tab => {
  tab.addEventListener('click', (e) => {
    document.querySelectorAll('#resvTabs .tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.getAttribute('data-tab');
    renderReservations();
  });
});

// 초기화 호출
renderReservations();

document.querySelectorAll('.modal-close, [data-modal-close]').forEach(btn => {
  btn.addEventListener('click', () => btn.closest('.modal-overlay')?.classList.add('hidden'));
});
</script>
</body>
</html>
