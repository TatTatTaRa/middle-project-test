<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드 — 파트너센터</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .dashboard-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
    }
  </style>
</head>

<body>
  <div class="layout">
    <div class="main">
      <header class="header">
        <div class="header-left">
          <div class="header-title">대시보드</div>
        </div>
        <div class="header-right">
          <div class="header-date"></div>

          <div class="avatar">P</div>
        </div>
      </header>
      <div class="page">

        <!-- Summary Cards -->
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label"><span class="stat-dot" style="background:#6366F1"></span>미배정 예약 (3일 내)</div>
            <div class="stat-value info">3</div>
            <div class="stat-sub">전체 6객실 중</div>
          </div>
          <div class="stat-card">
            <div class="stat-label"><span class="stat-dot" style="background:#F59E0B"></span>오늘 입실</div>
            <div class="stat-value warning">1</div>
            <div class="stat-sub">숲속 B</div>
          </div>
          <div class="stat-card">
            <div class="stat-label"><span class="stat-dot" style="background:#6B7280"></span>오늘 퇴실</div>
            <div class="stat-value">1</div>
            <div class="stat-sub">파노라마 C</div>
          </div>

        </div>

        <!-- Alert -->
        <div class="alert alert-warning" style="margin-bottom:20px">
          ⚠️ 이번 주말 (3/15~16) 3개 객실이 아직 비어 있습니다. 특별 할인 프로모션을 진행해 보세요.
          <a href="partner-coupons-new.html"
            style="color:#B45309;font-weight:700;margin-left:auto;white-space:nowrap">쿠폰 만들기 →</a>
        </div>

        <!-- 객실별 예약률 + 다가오는 입실 -->
        <div class="dashboard-grid" style="margin-bottom:20px">
          <!-- Bar Chart -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">객실별 예약률</div>
              <div class="card-subtitle">3월 15일 ~ 31일 (17일)</div>
            </div>
            <div class="bar-chart" id="roomBars"></div>
          </div>

          <!-- 다가오는 입실 -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">다가오는 입실</div>
              <span class="badge badge-primary">3건</span>
            </div>
            <div class="checkin-list">
              <div class="checkin-item">
                <div class="ci-date">
                  <div class="ci-month">3월</div>
                  <div class="ci-day">14</div>
                </div>
                <div class="ci-info">
                  <div class="ci-guest">이○○ 님 · 4인</div>
                  <div class="ci-detail">숲속 B · 1박 · ₩320,000</div>
                </div>
                <div class="ci-badge cib-today">오늘 입실</div>
              </div>
              <div class="checkin-item">
                <div class="ci-date">
                  <div class="ci-month">3월</div>
                  <div class="ci-day">15</div>
                </div>
                <div class="ci-info">
                  <div class="ci-guest">최○○ 님 · 2인</div>
                  <div class="ci-detail">파노라마 C · 2박 · ₩360,000</div>
                </div>
                <div class="ci-badge cib-tomorrow">내일</div>
              </div>
              <div class="checkin-item">
                <div class="ci-date">
                  <div class="ci-month">3월</div>
                  <div class="ci-day">16</div>
                </div>
                <div class="ci-info">
                  <div class="ci-guest">김○○ 님 · 3인</div>
                  <div class="ci-detail">별빛 D · 3박 · ₩480,000</div>
                </div>
                <div class="ci-badge cib-soon">모레</div>
              </div>
            </div>
          </div>
        </div>


      </div>
    </div>
  </div>
  <!-- Modals -->
  <script src="shared.js"></script>
  <script>
    initPage('partner', 'dashboard', '대시보드');

    // Room bar chart
    drawHorizBars('roomBars', [
      { label: '숲속 B', pct: 60, color: '#F59E0B' },
      { label: '파노라마C', pct: 33, color: '#10B981' },
      { label: '별빛 D', pct: 42, color: '#F59E0B' },
      { label: '힐링 E', pct: 66, color: '#6366F1' },
      { label: '하늘 F', pct: 44, color: '#F59E0B' },
    ]);
  </script>
</body>

</html>
