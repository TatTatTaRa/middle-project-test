<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예약 목록 — 파트너센터</title>
  <link rel="stylesheet" href="shared.css">
</head>

<body>
  <div class="layout">
    <div class="main">
      <header class="header">
        <div class="header-left">
          <div class="header-title">예약 목록</div>
        </div>
        <div class="header-right">
          <div class="header-date"></div>

          <div class="avatar">P</div>
        </div>
      </header>
      <div class="page">

        <div class="page-header">
          <div class="page-header-left">
            <div class="page-title">예약 목록</div>
            <div class="page-subtitle">전화·현장 취소/변경 요청 시 상세를 확인한 뒤 수정 또는 취소합니다.</div>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-ghost btn-sm" onclick="openCalModal()">📅 캘린더 뷰</button>

          </div>
        </div>

        <!-- Filter -->
        <div class="card" style="padding:16px;margin-bottom:16px">
          <div class="filter-bar">
            <input type="date" value="2026-03-01" id="dateFrom">
            <input type="date" value="2026-03-31" id="dateTo">
            <select id="filterStatus">
              <option value="active">전체 활성 예약</option>
              <option value="unassigned">미배정</option>
              <option value="assigned">배정 완료</option>
              <option value="completed">이용 완료</option>
              <option value="cancelled">취소</option>
            </select>
            <div class="search-box ml-auto">
              <input type="text" id="searchInput" placeholder="예약자명 · 연락처 · 예약번호...">
            </div>
            <button class="btn btn-primary btn-sm" onclick="renderManage()">조회</button>
          </div>
        </div>

        <!-- Table -->
        <div class="card" style="padding:0">
          <div style="padding:16px 20px;border-bottom:1px solid var(--gray-200)">
            <span style="font-size:13px" id="manageCountText">전체 <strong>0건</strong></span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>예약번호</th>
                  <th>예약자</th>
                  <th>연락처</th>
                  <th>객실</th>
                  <th>입실일</th>
                  <th>퇴실일</th>
                  <th>관리</th>
                </tr>
              </thead>
              <tbody id="manageRows"></tbody>
            </table>
          </div>
          <div style="padding:12px 20px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end">
            <div class="pagination">
              <div class="pg-btn">‹</div>
              <div class="pg-btn active">1</div>
              <div class="pg-btn">2</div>
              <div class="pg-btn">3</div>
              <div class="pg-btn">›</div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- 상세 보기 모달 -->
  <div class="modal-overlay hidden" id="modalDetail">
    <div class="modal" style="max-width:420px;">

      <!-- 헤더: 예약번호 + 상태 배지 -->
      <div class="modal-header" style="border-bottom:1px solid var(--gray-100);">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="modal-title">예약 상세 정보</div>
          <span style="font-size:12px;color:var(--gray-400);font-weight:500;" id="detailId"></span>
          <span id="detailStatusBadge"></span>
        </div>
        <button class="modal-close">×</button>
      </div>

      <div class="modal-body">

        <!-- 조회 모드 -->
        <div id="viewMode">
          <div style="display:flex;flex-direction:column;gap:8px;">

            <div style="display:flex;justify-content:space-between;">
              <span style="font-size:13px;color:var(--gray-400);">예약자명</span>
              <span style="font-size:13px;font-weight:600;color:var(--gray-900);" id="viewName"></span>
            </div>
            <div style="display:flex;justify-content:space-between;">
              <span style="font-size:13px;color:var(--gray-400);">연락처</span>
              <span style="font-size:13px;font-weight:600;color:var(--gray-900);" id="viewPhone"></span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:13px;color:var(--gray-400);">객실</span>
              <span style="font-size:13px;font-weight:600;color:var(--gray-900);" id="viewRoom"></span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:13px;color:var(--gray-400);">인원</span>
              <span id="viewGuestsBadge"></span>
            </div>
            <div style="display:flex;justify-content:space-between;">
              <span style="font-size:13px;color:var(--gray-400);">입실 일시</span>
              <span style="font-size:13px;font-weight:600;color:var(--gray-900);" id="viewCheckin"></span>
            </div>
            <div style="display:flex;justify-content:space-between;">
              <span style="font-size:13px;color:var(--gray-400);">퇴실 일시</span>
              <span style="font-size:13px;font-weight:600;color:var(--gray-900);" id="viewCheckout"></span>
            </div>


          </div>
        </div>

        <!-- 편집 모드 -->
        <div id="editMode" style="display:none;flex-direction:column;gap:12px;">
          <div class="form-row">
            <div><label class="form-label">예약자명 <span style="font-size:10px;color:var(--gray-300);">(수정 불가)</span></label><input class="form-control" id="detailName" readonly style="background:var(--gray-50);color:var(--gray-500);cursor:not-allowed;"></div>
            <div><label class="form-label">연락처 <span style="font-size:10px;color:var(--gray-300);">(수정 불가)</span></label><input class="form-control" id="detailPhone" readonly style="background:var(--gray-50);color:var(--gray-500);cursor:not-allowed;"></div>
          </div>
          <div>
            <label class="form-label">객실 타입</label>
            <select class="form-control" id="detailRoomType">
              <option value="Deluxe">Deluxe</option>
              <option value="Standard">Standard</option>
              <option value="Suite">Suite</option>
              <option value="Sky">Sky</option>
            </select>
          </div>
          <div class="form-row" style="margin-bottom:0;">
            <div><label class="form-label">입실 일시</label><input class="form-control" type="datetime-local" id="detailCheckin"></div>
            <div><label class="form-label">퇴실 일시</label><input class="form-control" type="datetime-local" id="detailCheckout"></div>
          </div>
        </div>

      </div>

      <!-- 푸터 -->
      <div class="modal-footer" style="flex-direction:column;gap:0;padding:0;" id="detailFooter">
        <!-- 주요 버튼: 중앙 -->
        <div style="display:flex;justify-content:center;align-items:center;gap:8px;padding:14px 20px;">
          <button class="btn btn-ghost" data-modal-close>닫기</button>
          <button class="btn btn-outline btn-sm" id="btnEdit" onclick="enterEditMode()">✏️ 수정</button>
          <button class="btn btn-primary" id="btnSave" style="display:none;" onclick="saveDetail()">변경사항 저장</button>
        </div>
        <!-- 추가 옵션 토글 -->
        <div id="btnMoreOpts" onclick="toggleExtraOpts()"
          style="display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border-top:1px solid var(--gray-100);cursor:pointer;font-size:11px;color:var(--gray-400);user-select:none;background:transparent;transition:background 0.12s;"
          onmouseover="this.style.background='var(--gray-50)'" onmouseout="this.style.background='transparent'">
          <svg id="extraArrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transition:transform 0.2s;"><polyline points="6 9 12 15 18 9"/></svg>
          추가 옵션
        </div>
        <!-- 추가 옵션 패널 -->
        <div id="extraOptsPanel" style="display:none;border-top:1px solid var(--gray-100);padding:12px 20px;background:var(--gray-50);">
          <div style="font-size:11px;color:var(--gray-400);margin-bottom:10px;font-weight:600;">⚠️ 주의가 필요한 작업</div>
          <button class="btn btn-sm" id="btnCancelResv"
            style="color:var(--danger);border:1.5px solid var(--danger);background:#fff;width:100%;justify-content:center;"
            onclick="cancelFromModal()">예약 취소</button>
        </div>
      </div>

    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    initPage('partner', 'manage', '예약 목록');

    // ──────────────────────────────────────────
    // 상태 정의
    // assignedRoom: null → 미배정, 문자열 → 배정완료
    // status: pending | confirmed | completed | cancelled
    // ──────────────────────────────────────────
    const manageData = [
      { id: '20260310-0042', name: '김민준', phone: '010-1234-5678', room: '디럭스 트윈', roomType: 'Deluxe', assignedRoom: '302호', checkin: '2026-03-20T15:00', checkout: '2026-03-22T11:00', status: 'confirmed', guests: 2, request: '' },
      { id: '20260308-0019', name: '이서연', phone: '010-9876-5432', room: '스탠다드 더블', roomType: 'Standard', assignedRoom: null, checkin: '2026-03-18T15:00', checkout: '2026-03-19T11:00', status: 'confirmed', guests: 1, request: '조용한 방 요청' },
      { id: '20260312-0077', name: '박도윤', phone: '010-5553-4444', room: '프리미어 스위트', roomType: 'Suite', assignedRoom: '501호', checkin: '2026-03-25T15:00', checkout: '2026-03-27T11:00', status: 'confirmed', guests: 3, request: '생일 이벤트 준비 요청' },
      { id: '20260309-0055', name: '최지우', phone: '010-7777-8888', room: '계곡라 에디션', roomType: 'Deluxe', assignedRoom: null, checkin: '2026-03-22T15:00', checkout: '2026-03-24T11:00', status: 'confirmed', guests: 2, request: '' },
      { id: '20260314-0003', name: '정하은', phone: '010-3333-2222', room: '포레스트 스탠다드', roomType: 'Standard', assignedRoom: null, checkin: '2026-03-18T15:00', checkout: '2026-03-20T11:00', status: 'confirmed', guests: 2, request: '' },
      { id: '20260307-0061', name: '윤서아', phone: '010-1111-9999', room: '스카이 듀플렉스', roomType: 'Sky', assignedRoom: '203호', checkin: '2026-03-28T15:00', checkout: '2026-03-30T11:00', status: 'confirmed', guests: 2, request: '알레르기 (복숭아)' },
      { id: '20260315-0021', name: '한지민', phone: '010-8888-1111', room: '스카이 스위트', roomType: 'Sky', assignedRoom: null, checkin: '2026-03-29T15:00', checkout: '2026-03-31T11:00', status: 'confirmed', guests: 3, request: '' },
      { id: '20260305-0034', name: '임준혁', phone: '010-4444-5555', room: '파노라마 듀플렉스', roomType: 'Deluxe', assignedRoom: '401호', checkin: '2026-03-10T15:00', checkout: '2026-03-12T11:00', status: 'completed', guests: 1, request: '' },
      { id: '20260301-0088', name: '강현우', phone: '010-6666-7777', room: '계곡라 에디션', roomType: 'Deluxe', assignedRoom: null, checkin: '2026-03-05T15:00', checkout: '2026-03-07T11:00', status: 'cancelled', guests: 4, request: '' },
    ];

    // 배정 상태 판정
    function getAssignState(r) {
      if (r.status === 'completed') return 'completed';
      if (r.status === 'cancelled') return 'cancelled';
      return r.assignedRoom ? 'assigned' : 'unassigned';
    }

    function assignBadge(r) {
      const s = getAssignState(r);
      if (s === 'assigned') return `<span class="badge badge-confirmed">배정완료</span>`;
      if (s === 'unassigned') return `<span class="badge badge-pending">미배정</span>`;
      if (s === 'completed') return `<span class="badge badge-completed">이용완료</span>`;
      if (s === 'cancelled') return `<span class="badge badge-cancelled">취소</span>`;
    }

    function isActive(r) {
      return r.status !== 'completed' && r.status !== 'cancelled';
    }

    let currentDetailIdx = null;

    function renderManage() {
      const filterVal = document.getElementById('filterStatus').value;
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

      const filtered = manageData.filter(r => {
        const s = getAssignState(r);
        if (filterVal === 'active' && !isActive(r)) return false;
        if (filterVal === 'unassigned' && s !== 'unassigned') return false;
        if (filterVal === 'assigned' && s !== 'assigned') return false;
        if (filterVal === 'completed' && s !== 'completed') return false;
        if (filterVal === 'cancelled' && s !== 'cancelled') return false;
        if (keyword &&
          !r.id.toLowerCase().includes(keyword) &&
          !r.name.toLowerCase().includes(keyword) &&
          !r.phone.includes(keyword)) return false;
        return true;
      });

      document.getElementById('manageCountText').innerHTML = `전체 <strong>${filtered.length}건</strong>`;

      document.getElementById('manageRows').innerHTML = filtered.map((r, i) => {
        return `
      <tr>
        <td style="font-size:12px;color:var(--gray-600)">${r.id}</td>
        <td style="font-weight:600">${r.name}</td>
        <td style="font-size:12px;color:var(--gray-500)">${r.phone}</td>
        <td>${r.room}</td>
        <td style="font-size:13px">${r.checkin.slice(0, 10)}</td>
        <td style="font-size:13px">${r.checkout.slice(0, 10)}</td>
        <td><button class="btn btn-outline btn-sm" onclick="openDetail(${i})">상세</button></td>
      </tr>
    `;
      }).join('');

      window._filteredManage = filtered;
    }

    function openDetail(idx) {
      const r = window._filteredManage[idx];
      currentDetailIdx = idx;
      exitEditMode();

      // 헤더: 예약번호 + 상태 배지
      document.getElementById('detailId').textContent = r.id;
      document.getElementById('detailStatusBadge').innerHTML = assignBadge(r);

      // 뷰 업데이트
      document.getElementById('viewName').textContent = r.name;
      document.getElementById('viewPhone').textContent = r.phone;
      document.getElementById('viewRoom').innerHTML = `${r.roomType} <span style="font-size:11px;font-weight:500;color:var(--gray-400);">(${r.room})</span>`;
      document.getElementById('viewGuestsBadge').innerHTML = `<span style="display:inline-flex;align-items:center;gap:4px;background:var(--primary-light);color:var(--primary);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;">👥 ${r.guests}인</span>`;
      document.getElementById('viewCheckin').textContent = r.checkin.replace('T', ' ');
      document.getElementById('viewCheckout').textContent = r.checkout.replace('T', ' ');


      // 편집 폼 기본값 세팅
      document.getElementById('detailName').value = r.name;
      document.getElementById('detailPhone').value = r.phone;
      document.getElementById('detailRoomType').value = r.roomType;
      document.getElementById('detailCheckin').value = r.checkin;
      document.getElementById('detailCheckout').value = r.checkout;


      // 종료된 예약: 수정/추가옵션 숨김
      const readonly = !isActive(r);
      document.getElementById('btnEdit').style.display = readonly ? 'none' : '';
      document.getElementById('btnMoreOpts').style.display = readonly ? 'none' : '';
      document.getElementById('extraOptsPanel').style.display = 'none';
      document.getElementById('extraArrow').style.transform = '';
      const btnCancelR = document.getElementById('btnCancelResv');
      btnCancelR.disabled = readonly;
      btnCancelR.style.opacity = readonly ? '.4' : '';

      document.getElementById('modalDetail').classList.remove('hidden');
    }

    function enterEditMode() {
      document.getElementById('viewMode').style.display = 'none';
      document.getElementById('editMode').style.display = 'flex';
      document.getElementById('btnEdit').style.display = 'none';
      document.getElementById('btnSave').style.display = '';
      document.getElementById('btnMoreOpts').style.display = 'none';
      document.getElementById('extraOptsPanel').style.display = 'none';
    }

    function exitEditMode() {
      document.getElementById('viewMode').style.display = 'block';
      document.getElementById('editMode').style.display = 'none';
      document.getElementById('btnEdit').style.display = '';
      document.getElementById('btnSave').style.display = 'none';
      document.getElementById('btnMoreOpts').style.display = '';
    }

    function toggleExtraOpts() {
      const panel = document.getElementById('extraOptsPanel');
      const arrow = document.getElementById('extraArrow');
      const showing = panel.style.display !== 'none';
      panel.style.display = showing ? 'none' : 'block';
      arrow.style.transform = showing ? '' : 'rotate(180deg)';
    }

    function saveDetail() {

      showAlert('변경사항이 저장되었습니다.', { icon: '✅', title: '저장 완료' });
      document.getElementById('modalDetail').classList.add('hidden');
    }

    function cancelFromModal() {
      const r = window._filteredManage[currentDetailIdx];
      // 취소 방식 선택 모달 열기
      document.getElementById('crResNo').textContent = r.id;
      document.getElementById('crGuestInfo').textContent = r.name + ' 님 · ' + r.room;
      document.getElementById('modalCancelReason').classList.remove('hidden');
    }

    function confirmCancelRefund() {
      const r = window._filteredManage[currentDetailIdx];
      document.getElementById('modalCancelReason').classList.add('hidden');
      showConfirm(
        r.name + '님의 예약을 취소하시겠습니까?\n고객에게 전액 환불 처리됩니다.',
        () => {
          r.status = 'cancelled';
          r.assignedRoom = null;
          document.getElementById('modalDetail').classList.add('hidden');
          renderManage();
          showAlert('취소 처리가 완료되었습니다.\n고객에게 전액 환불되었습니다.', { icon: '✅', title: '환불 취소 완료' });
        },
        { icon: '⚠️', title: '전액 환불 취소', confirmText: '취소 확정', confirmClass: 'btn-danger' }
      );
    }

    function confirmCancelAgreed() {
      const r = window._filteredManage[currentDetailIdx];
      document.getElementById('modalCancelReason').classList.add('hidden');
      showConfirm(
        r.name + '님의 예약을 고객 연락 후 해제 처리하시겠습니까?\n환불 없이 예약이 해제되며, 오프라인에서 고객과 직접 정산되어야 합니다.',
        () => {
          r.status = 'cancelled';
          r.assignedRoom = null;
          document.getElementById('modalDetail').classList.add('hidden');
          renderManage();
          showAlert('예약 해제 처리가 완료되었습니다.\n오프라인 정산을 진행해 주세요.', { icon: '✅', title: '해제 완료' });
        },
        { icon: '📞', title: '해제 확인', confirmText: '해제 확정', confirmClass: 'btn-primary' }
      );
    }

    renderManage();
  </script>

<!-- ── 취소 방식 선택 모달 ── -->
<div class="modal-overlay hidden" id="modalCancelReason" style="z-index:1100;">
  <div class="modal modal-sm" style="overflow:hidden;">
    <div style="background:linear-gradient(135deg,#7F1D1D,#991B1B);padding:22px 22px 18px;position:relative;">
      <button class="modal-close" onclick="document.getElementById('modalCancelReason').classList.add('hidden')" style="position:absolute;top:14px;right:14px;color:rgba(255,255,255,0.5);">×</button>
      <div style="font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:0.1em;font-weight:600;margin-bottom:8px;">예약 취소 방식 선택</div>
      <div style="font-size:14px;font-weight:800;color:#fff;margin-bottom:2px;" id="crResNo"></div>
      <div style="font-size:12px;color:rgba(255,255,255,0.5);" id="crGuestInfo"></div>
    </div>
    <div style="padding:14px 16px 8px;display:flex;flex-direction:column;gap:8px;">

      <!-- 전액 환불 -->
      <button onclick="confirmCancelRefund()"
        style="display:flex;align-items:flex-start;gap:14px;width:100%;padding:16px;background:#FFF1F2;border:1.5px solid #FECDD3;border-radius:12px;cursor:pointer;transition:all 0.15s;text-align:left;"
        onmouseover="this.style.background='#FFE4E6';this.style.borderColor='#FDA4AF';this.style.transform='translateX(2px)'"
        onmouseout="this.style.background='#FFF1F2';this.style.borderColor='#FECDD3';this.style.transform='translateX(0)'">
        <div style="width:38px;height:38px;border-radius:10px;background:#FFE4E6;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E11D48" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:700;color:#E11D48;margin-bottom:4px;">전액 환불 취소 <span style="font-size:11px;font-weight:600;background:#FFE4E6;padding:1px 7px;border-radius:20px;">환불 100%</span></div>
          <div style="font-size:12px;color:#BE123C;line-height:1.6;">예약을 즉시 취소하며 고객에게 <strong>전액 환불</strong> 처리됩니다.</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FDA4AF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <!-- 고객 연락 후 해제 -->
      <button onclick="confirmCancelAgreed()"
        style="display:flex;align-items:flex-start;gap:14px;width:100%;padding:16px;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:12px;cursor:pointer;transition:all 0.15s;text-align:left;"
        onmouseover="this.style.background='#F1F5F9';this.style.borderColor='#CBD5E1';this.style.transform='translateX(2px)'"
        onmouseout="this.style.background='#F8FAFC';this.style.borderColor='#E2E8F0';this.style.transform='translateX(0)'">
        <div style="width:38px;height:38px;border-radius:10px;background:#E2E8F0;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.89 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.8 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 17z"/></svg>
        </div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:700;color:#475569;margin-bottom:4px;">고객 연락 후 해제 <span style="font-size:11px;font-weight:600;background:#E2E8F0;color:#64748B;padding:1px 7px;border-radius:20px;">상호 협의</span></div>
          <div style="font-size:12px;color:#64748B;line-height:1.6;">고객과 연락 후 협의된 해제 — <strong>환불 없음</strong>.<br>오프라인에서 직접 정산되어야 합니다.</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

    </div>
    <div style="padding:8px 16px 16px;">
      <button class="btn btn-ghost" onclick="document.getElementById('modalCancelReason').classList.add('hidden')" style="width:100%;justify-content:center;border-color:var(--gray-100);color:var(--gray-400);">닫기</button>
    </div>
  </div>
</div>

<!-- 예약 현황 캘린더 모달 -->
<style>
.calmo{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.calmo.hidden{display:none}
.calmo-box{background:#fff;border-radius:16px;box-shadow:0 24px 64px rgba(0,0,0,.2);width:100%;max-width:1020px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.calmo-head{padding:14px 18px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;gap:8px;flex-shrink:0}
.calmo-body{flex:1;overflow:auto;padding:16px 18px}
.cal-wrap{overflow-x:auto}
.cal-grid{border:1px solid var(--gray-200);border-radius:10px;overflow:hidden;min-width:660px}
.cal-hrow,.cal-rrow{display:grid}
.cal-hrow{background:var(--gray-50);border-bottom:1px solid var(--gray-200)}
.cal-hcell{padding:5px 2px;text-align:center;font-size:10px;font-weight:600;color:var(--gray-500);border-right:1px solid var(--gray-100)}
.cal-hcell.tday{color:var(--primary);background:var(--primary-light)}
.cal-rlabel{padding:0 8px;display:flex;align-items:center;font-size:11px;font-weight:700;color:var(--gray-700);border-right:1px solid var(--gray-200);background:var(--gray-50);white-space:nowrap}
.cal-rrow{border-bottom:1px solid var(--gray-100);position:relative;height:34px}
.cal-rrow:last-child{border-bottom:none}
.cal-dcell{border-right:1px solid var(--gray-100);height:100%}
.cal-dcell.tc{background:rgba(99,102,241,.05)}
.rbar{position:absolute;top:4px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;cursor:default;z-index:2;padding:0 5px}
.rbar:hover{opacity:.8}
.calleg{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.calleg-i{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gray-600)}
.calleg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
</style>

<div class="calmo hidden" id="modalCal">
  <div class="calmo-box">
    <div class="calmo-head">
      <div style="flex:1">
        <div id="calTitle" style="font-size:16px;font-weight:800;color:var(--gray-800)"></div>
        <div style="font-size:12px;color:var(--gray-400);margin-top:1px">객실별 예약이 이번 달 어떻게 채워져 있는지 확인합니다.</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="shiftCal(-1)">‹ 이전달</button>
      <button class="btn btn-ghost btn-sm" onclick="shiftCal(0)">오늘</button>
      <button class="btn btn-ghost btn-sm" onclick="shiftCal(1)">다음달 ›</button>
      <button style="width:30px;height:30px;border:none;background:var(--gray-100);border-radius:8px;cursor:pointer;font-size:18px;line-height:1" onclick="document.getElementById('modalCal').classList.add('hidden')">×</button>
    </div>
    <div class="calmo-body">
      <div class="cal-wrap"><div class="cal-grid" id="calGrid"></div></div>
      <div class="calleg" id="calLeg"></div>
    </div>
  </div>
</div>

<script>
let cY,cM;
const CR=['스탠다드 더블','디럭스 트윈','프리미어 스위트','계곡뷰 A','힐링 E','하늘 F','파노라마 C','숲속 B'];
const CC=['#6366F1','#10B981','#F59E0B','#EF4444','#8B5CF6','#0EA5E9','#EC4899','#14B8A6'];
const CDATA=[
  {room:'디럭스 트윈',n:'김민준',f:'2026-03-20',t:'2026-03-22'},
  {room:'스탠다드 더블',n:'이서연',f:'2026-03-18',t:'2026-03-19'},
  {room:'프리미어 스위트',n:'박도윤',f:'2026-03-25',t:'2026-03-27'},
  {room:'계곡뷰 A',n:'최지우',f:'2026-03-22',t:'2026-03-24'},
  {room:'힐링 E',n:'윤서아',f:'2026-03-28',t:'2026-03-30'},
  {room:'하늘 F',n:'한지민',f:'2026-03-29',t:'2026-03-31'},
  {room:'파노라마 C',n:'임준혁',f:'2026-03-10',t:'2026-03-12'},
  {room:'숲속 B',n:'정하은',f:'2026-03-18',t:'2026-03-20'},
  {room:'디럭스 트윈',n:'오예진',f:'2026-03-05',t:'2026-03-08'},
  {room:'스탠다드 더블',n:'강준서',f:'2026-03-12',t:'2026-03-14'},
  {room:'계곡뷰 A',n:'고다은',f:'2026-03-02',t:'2026-03-04'},
  {room:'힐링 E',n:'임지호',f:'2026-03-14',t:'2026-03-16'},
  {room:'디럭스 트윈',n:'소현진',f:'2026-03-01',t:'2026-03-03'},
  {room:'프리미어 스위트',n:'권영환',f:'2026-03-08',t:'2026-03-11'},
  {room:'숲속 B',n:'나태양',f:'2026-03-24',t:'2026-03-26'},
];
function openCalModal(){const n=new Date();cY=n.getFullYear();cM=n.getMonth()+1;renderCal();document.getElementById('modalCal').classList.remove('hidden');}
function shiftCal(d){if(d===0){const n=new Date();cY=n.getFullYear();cM=n.getMonth()+1;}else{cM+=d;if(cM>12){cM=1;cY++;}if(cM<1){cM=12;cY--;}}renderCal();}
function renderCal(){
  const dim=new Date(cY,cM,0).getDate();
  const tod=new Date().toISOString().slice(0,10);
  const mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dn=['일','월','화','수','목','금','토'];
  document.getElementById('calTitle').textContent=cY+'년 '+mn[cM-1]+' 예약 현황';
  const ym=cY+'-'+String(cM).padStart(2,'0');
  const ms=ym+'-01', me=ym+'-'+String(dim).padStart(2,'0');
  const LW=84,DW=27;
  const cols=LW+'px '+Array(dim).fill(DW+'px').join(' ');
  let h='<div class="cal-hrow" style="grid-template-columns:'+cols+'">';
  h+='<div class="cal-rlabel" style="height:36px;background:var(--gray-100);font-size:11px">객실</div>';
  for(let d=1;d<=dim;d++){
    const ds=ym+'-'+String(d).padStart(2,'0');
    const dow=new Date(ds).getDay();
    const it=ds===tod;
    const c=dow===0?'#EF4444':dow===6?'#6366F1':'';
    h+='<div class="cal-hcell'+(it?' tday':'')+'" style="'+(c?'color:'+c:'')+'">'
      +d+'<br><span style="font-size:8px">'+dn[dow]+'</span></div>';
  }
  h+='</div>';
  CR.forEach(function(room,ri){
    const col=CC[ri%CC.length];
    const rvs=CDATA.filter(function(r){return r.room===room&&r.t>=ms&&r.f<=me;});
    h+='<div class="cal-rrow" style="grid-template-columns:'+cols+';display:grid">';
    h+='<div class="cal-rlabel">'+room+'</div>';
    for(let d=1;d<=dim;d++){
      const ds=ym+'-'+String(d).padStart(2,'0');
      h+='<div class="cal-dcell'+(ds===tod?' tc':'')+'"></div>';
    }
    rvs.forEach(function(r){
      const sd=Math.max(1,parseInt((r.f>=ms?r.f:ms).slice(8)));
      const ed=Math.min(dim,parseInt((r.t<=me?r.t:me).slice(8)));
      const span=ed-sd+1;
      const left=LW+(sd-1)*DW+2;
      const width=span*DW-4;
      h+='<div class="rbar" style="left:'+left+'px;width:'+width+'px;background:'+col+'" title="'+r.n+' ('+r.f+'~'+r.t+')">'+(span>=3?r.n:'')+'</div>';
    });
    h+='</div>';
  });
  document.getElementById('calGrid').innerHTML=h;
  document.getElementById('calLeg').innerHTML=CR.map(function(r,i){
    return '<div class="calleg-i"><div class="calleg-dot" style="background:'+CC[i%CC.length]+'"></div>'+r+'</div>';
  }).join('');
}
</script>
</body>

</html>
