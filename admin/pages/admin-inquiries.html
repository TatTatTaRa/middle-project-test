<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파트너 문의 — Super Admin</title>
<link rel="stylesheet" href="shared.css">
<style>
.inq-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 0;
  height: calc(100vh - 64px);
  overflow: hidden;
}
.inq-list-panel {
  border-right: 1px solid var(--gray-200);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.inq-list-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff;
}
.inq-search {
  flex: 1;
  padding: 7px 12px;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  font-size: 13px;
  outline: none;
}
.inq-search:focus { border-color: #6366F1; }
.inq-tabs {
  display: flex;
  border-bottom: 1px solid var(--gray-200);
  background: #fff;
}
.inq-tab {
  flex: 1;
  padding: 9px;
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  color: var(--gray-500);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.inq-tab.active { color: #6366F1; border-bottom-color: #6366F1; }
.inq-list {
  flex: 1;
  overflow-y: auto;
}
.inq-item {
  padding: 14px 16px;
  border-bottom: 1px solid var(--gray-100);
  cursor: pointer;
  transition: background 0.1s;
}
.inq-item:hover, .inq-item.active { background: #EEF2FF; }
.inq-item-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.inq-corp { font-size: 13px; font-weight: 700; color: var(--gray-800); }
.inq-time { font-size: 11px; color: var(--gray-400); margin-left: auto; }
.inq-subject { font-size: 13px; color: var(--gray-700); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.inq-preview { font-size: 12px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dot-unread { width: 7px; height: 7px; border-radius: 50%; background: #6366F1; flex-shrink: 0; }

/* 상태 뱃지 */
.inq-badge {
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; flex-shrink: 0;
}
.inq-badge-new { background: #EDE9FE; color: #6366F1; }
.inq-badge-done { background: var(--gray-100); color: var(--gray-500); }
.inq-badge-reapp { background: #FEF3C7; color: #92400E; }

/* 오른쪽 채팅 패널 */
.inq-chat-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #F8FAFC;
}
.inq-chat-header {
  padding: 14px 20px;
  background: #fff;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  gap: 12px;
}
.inq-chat-corp { font-size: 15px; font-weight: 700; }
.inq-chat-sub { font-size: 12px; color: var(--gray-400); }
.inq-chat-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.msg-row { display: flex; gap: 10px; }
.msg-row.me { flex-direction: row-reverse; }
.msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.msg-bubble {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.6;
}
.msg-bubble.partner { background: #fff; border: 1px solid var(--gray-200); color: var(--gray-800); border-radius: 2px 12px 12px 12px; }
.msg-bubble.admin { background: #6366F1; color: #fff; border-radius: 12px 2px 12px 12px; }
.msg-time { font-size: 10px; color: var(--gray-400); align-self: flex-end; flex-shrink: 0; }
.inq-chat-input {
  padding: 12px 16px;
  background: #fff;
  border-top: 1px solid var(--gray-200);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.inq-textarea {
  flex: 1;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 9px 12px;
  font-size: 13px;
  resize: none;
  outline: none;
  min-height: 40px;
  max-height: 120px;
  font-family: inherit;
}
.inq-textarea:focus { border-color: #6366F1; }
.inq-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--gray-400);
  gap: 12px;
}
.inq-empty-icon { font-size: 48px; }
</style>
</head>
<body>
<div class="layout">
  <div class="main" style="display:flex;flex-direction:column;padding:0;">
    <header class="header" style="flex-shrink:0">
      <div class="header-left"><div class="header-title">파트너 문의</div></div>
      <div class="header-right">
        <div class="header-date"></div>
        <div class="avatar" style="background:#6366F1">A</div>
      </div>
    </header>

    <div class="inq-layout">
      <!-- 왼쪽: 문의 목록 -->
      <div class="inq-list-panel">
        <div class="inq-list-header">
          <input type="text" class="inq-search" placeholder="파트너명 또는 내용 검색...">
        </div>
        <div class="inq-tabs">
          <div class="inq-tab active" onclick="switchInqTab('all', this)">전체</div>
          <div class="inq-tab" onclick="switchInqTab('new', this)">미답변</div>
          <div class="inq-tab" onclick="switchInqTab('done', this)">답변완료</div>
        </div>
        <div class="inq-list" id="inqList"></div>
      </div>

      <!-- 오른쪽: 채팅 상세 -->
      <div class="inq-chat-panel" id="chatPanel">
        <div class="inq-empty" id="emptyState">
          <div class="inq-empty-icon">💬</div>
          <div style="font-weight:600;color:var(--gray-600)">문의를 선택해주세요</div>
          <div style="font-size:12px">파트너의 문의 내용을 확인하고 답변할 수 있습니다.</div>
        </div>
        <div id="chatView" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden">
          <div class="inq-chat-header" id="chatHeader"></div>
          <div class="inq-chat-body" id="chatBody"></div>
          <div class="inq-chat-input">
            <textarea class="inq-textarea" id="replyInput" rows="1" placeholder="답변을 입력하세요..."></textarea>
            <button class="btn btn-sm" style="background:#6366F1;color:#fff;border:none;padding:9px 16px;flex-shrink:0" onclick="sendReply()">전송</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
initPage('admin', 'inquiries', '파트너 문의');

const INQ_DATA = [
  {
    id: 1, corp: '롯데호텔 (주)', bizNum: '135-81-05368', phone: '010-5555-6666', status: 'new', badge: 'inq-badge-new', badgeLabel: '미답변',
    subject: '정산 지연 관련 문의',
    preview: '이번 달 정산이 아직 처리가 안 된 것 같아서...',
    time: '방금 전',
    messages: [
      { from: 'partner', text: '안녕하세요. 이번 달 3월 정산이 아직 처리되지 않은 것 같습니다.\n확인 부탁드립니다.', time: '10:12' },
      { from: 'partner', text: '3월 1일부터 15일까지 예약 건이 총 23건인데 정산 내역에 반영이 안 되어 있습니다.', time: '10:13' },
    ]
  },

  {
    id: 4, corp: '소노벨 리조트 (주)', bizNum: '211-86-68194', phone: '010-2222-3333', status: 'done', badge: 'inq-badge-done', badgeLabel: '답변완료',
    subject: '정산 계좌 변경 방법',
    preview: '답변해주셔서 감사합니다.',
    time: '어제',
    messages: [
      { from: 'partner', text: '정산 계좌를 변경하고 싶은데 어떻게 하면 되나요?', time: '어제 14:20' },
      { from: 'admin', text: '정산 계좌 변경은 파트너센터 > 숙소 설정 > 정산 계좌 메뉴에서 가능합니다.\n변경 요청 시 운영팀 검토 후 1~2 영업일 내에 적용됩니다.', time: '어제 14:45' },
      { from: 'partner', text: '답변해주셔서 감사합니다. 바로 변경해보겠습니다.', time: '어제 15:00' },
    ]
  },
];

let currentTab = 'all';
let selectedId = null;

function switchInqTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.inq-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  const data = currentTab === 'all' ? INQ_DATA
    : currentTab === 'new' ? INQ_DATA.filter(d => d.status === 'new')
    : INQ_DATA.filter(d => d.status === 'done');

  document.getElementById('inqList').innerHTML = data.map(d => `
    <div class="inq-item${selectedId === d.id ? ' active' : ''}" onclick="openChat(${d.id})" style="display:flex; gap:12px; align-items:flex-start;">
      <div style="font-size:22px; margin-top:2px;">🏨</div>
      <div style="flex:1; min-width:0;">
        <div class="inq-item-header">
          ${d.status === 'new' ? '<div class="dot-unread"></div>' : ''}
          <div class="inq-corp">${d.corp}</div>
          <div class="inq-time" style="margin-left:auto">${d.time}</div>
        </div>
        <div style="margin-bottom:4px;display:flex;align-items:center;gap:6px">
          <span class="inq-badge ${d.badge}">${d.badgeLabel}</span>
          <div class="inq-subject">${d.subject}</div>
        </div>
        <div class="inq-preview">${d.preview}</div>
      </div>
    </div>
  `).join('') || '<div style="padding:30px;text-align:center;color:var(--gray-400);font-size:13px">문의가 없습니다.</div>';
}

function openChat(id) {
  selectedId = id;
  const inq = INQ_DATA.find(d => d.id === id);
  renderList();

  document.getElementById('emptyState').style.display = 'none';
  const chatView = document.getElementById('chatView');
  chatView.style.display = 'flex';

  document.getElementById('chatHeader').innerHTML = `
    <div style="display:flex;flex-direction:column;justify-content:center;flex:1">
      <div class="inq-chat-corp" style="margin-bottom:6px;display:flex;align-items:center;gap:6px">
        <span>${inq.corp}</span>
        <span class="inq-badge ${inq.badge}">${inq.badgeLabel}</span>
      </div>
      <div style="font-size:11px;color:var(--gray-500);display:flex;align-items:center;gap:4px">
        <span>사업자: ${inq.bizNum}</span>
        <button style="background:var(--gray-100);border:1px solid var(--gray-200);border-radius:4px;padding:2px 4px;font-size:10px;color:var(--gray-500);cursor:pointer;" onclick="navigator.clipboard.writeText('${inq.bizNum}'); showAlert('사업자등록번호가 클립보드에 복사되었습니다.', {icon:'📋'})">복사</button>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm ml-auto" onclick="markDone(${id})" style="align-self:flex-start;">답변 완료 처리</button>
  `;

  document.getElementById('chatBody').innerHTML = inq.messages.map(m => `
    <div class="msg-row ${m.from === 'admin' ? 'me' : ''}">
      <div class="msg-avatar" style="background:${m.from === 'admin' ? '#EDE9FE' : '#FEF3C7'}">${m.from === 'admin' ? '🏢' : '🏨'}</div>
      <div class="msg-bubble ${m.from === 'admin' ? 'admin' : 'partner'}">${m.text.replace(/\n/g, '<br>')}</div>
      <div class="msg-time">${m.time}</div>
    </div>
  `).join('');

  // 스크롤 맨 아래로
  const body = document.getElementById('chatBody');
  body.scrollTop = body.scrollHeight;
}

function sendReply() {
  const input = document.getElementById('replyInput');
  const text = input.value.trim();
  if (!text || !selectedId) return;

  const inq = INQ_DATA.find(d => d.id === selectedId);
  inq.messages.push({ from: 'admin', text, time: '방금' });
  inq.status = 'done';
  inq.badge = 'inq-badge-done';
  inq.badgeLabel = '답변완료';
  inq.preview = text.substring(0, 30) + (text.length > 30 ? '...' : '');

  input.value = '';
  openChat(selectedId);
  renderList();
}

function markDone(id) {
  const inq = INQ_DATA.find(d => d.id === id);
  if (inq.status === 'done') { showAlert('이미 답변 완료 처리된 문의입니다.', {icon:'ℹ️'}); return; }
  inq.status = 'done';
  inq.badge = 'inq-badge-done';
  inq.badgeLabel = '답변완료';
  openChat(id);
  renderList();
  showAlert('답변 완료 처리되었습니다.', { icon: '✅' });
}

renderList();
</script>
</body>
</html>
