<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약 관리 — 파트너센터</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="layout">
  <div class="main">
    <header class="header">
      <div class="header-left"><div class="header-title">예약 관리</div></div>
      <div class="header-right">
        <div class="header-date"></div>
        <button class="btn-icon">🔔<span class="notification-dot"></span></button>
        <div class="avatar">P</div>
      </div>
    </header>
    <div class="page">

      <div class="page-header">
        <div class="page-header-left">
          <div class="page-title">통합 예약 리스트</div>
        </div>
        <div class="flex gap-2">
          <a href="partner-reservations-calendar.html"><button class="btn btn-ghost btn-sm">📅 캘린더 뷰</button></a>
          <button class="btn btn-primary btn-sm">+ 예약 등록</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:#6366F1"></span>전체 예약</div><div class="stat-value" style="color:var(--gray-900);">120</div></div>
        <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:#3B82F6"></span>예약 확정</div><div class="stat-value info">31</div></div>
        <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:#10B981"></span>이용 완료</div><div class="stat-value success">87</div></div>
        <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:#EF4444"></span>예약 취소</div><div class="stat-value danger">2</div></div>
      </div>

      <!-- Filter -->
      <div class="card" style="padding:16px;margin-bottom:16px">
        <div class="filter-bar">
          <select><option>일별</option><option>주별</option><option>월별</option></select>
          <input type="date" value="2026-03-01">
          <input type="date" value="2026-03-31">
          <select><option>전체 상태</option><option>예약 확정</option><option>이용 완료</option><option>예약 취소</option></select>
          <select><option>전체 객실</option><option>계곡뷰 A</option><option>숲속 B</option><option>파노라마 C</option></select>
          <div class="search-box ml-auto">
            <input type="text" placeholder="예약자명 또는 예약번호...">
          </div>
          <button class="btn btn-primary btn-sm">조회</button>
        </div>
      </div>

      <!-- Table -->
      <div class="card" style="padding:0">
        <div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-200)">
          <div style="font-size:13px" id="resvCountText">전체 <strong>120건</strong> &nbsp;<span style="color:var(--gray-400)">· 예약확정(31) · 이용완료(87) · 예약취소(2)</span></div>
          <div style="font-size:12px;color:var(--gray-400)">10개씩 보기 ▾</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="reservationHead">
              <!-- 동적으로 컬럼 헤더가 들어갑니다 -->
            </thead>
            <tbody id="reservationRows"></tbody>
          </table>
        </div>
        <div style="padding:12px 20px;border-top:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between">
          <div style="display:flex;gap:8px">
            <!-- 일괄 액션 제거 (단일 통합 목록용으로 단순화) -->
          </div>
          <div class="pagination">
            <div class="pg-btn">‹</div>
            <div class="pg-btn active">1</div>
            <div class="pg-btn">2</div>
            <div class="pg-btn">3</div>
            <div class="pg-btn">4</div>
            <div class="pg-btn">5</div>
            <div class="pg-btn">›</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Reservation Detail Modal -->
<div class="modal-overlay hidden" id="modalDetail">
  <div class="modal modal-lg">

    <!-- 헤더 -->
    <div class="modal-header" style="border-bottom:1px solid var(--gray-100);padding-bottom:16px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="modal-title" style="font-size:17px;">예약 상세 정보</div>
        <span style="font-size:12px;color:var(--gray-400);font-weight:500;">REV-20231024-00892</span>
        <span class="badge badge-confirmed">예약확정</span>
      </div>
      <button class="modal-close">×</button>
    </div>

    <!-- 상태 변경 바 -->
    <div style="padding:12px 24px;background:var(--primary-light);display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--gray-100);">
      <span style="font-size:12px;font-weight:700;color:var(--primary);white-space:nowrap;">상태 변경</span>
      <select class="form-control" style="max-width:180px;padding:6px 10px;font-size:13px;">
        <option>예약확정</option>
        <option>이용중</option>
        <option>이용완료</option>
        <option>예약취소</option>
      </select>
    </div>

    <!-- 바디 -->
    <div class="modal-body" style="display:flex;flex-direction:column;gap:20px;padding:24px;">

      <!-- 예약자 정보 -->
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;">👤 예약자 정보</div>
        <div class="form-row">
          <div><label class="form-label">예약자명</label><input class="form-control" value="김철수"></div>
          <div><label class="form-label">연락처</label><input class="form-control" value="010-1234-5678"></div>
        </div>
      </div>

      <!-- 예약 내역 -->
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;">🛏️ 예약 내역</div>
        <div style="display:flex;flex-direction:column;gap:10px;">

          <!-- 상품명 + 객실 배정 -->
          <div style="background:var(--gray-50);border:1px solid var(--gray-100);border-radius:var(--radius);padding:14px;">
            <div style="font-weight:700;font-size:14px;margin-bottom:6px;">계곡뷰 A (Deluxe Twin)</div>
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <div style="font-size:13px;color:var(--gray-600);">배정 호실:
                <span style="font-weight:700;color:var(--primary);background:var(--primary-light);padding:2px 8px;border-radius:4px;margin-left:4px;">305호</span>
              </div>
              <a href="partner-reservations-calendar.html" class="btn btn-primary btn-sm" style="text-decoration:none;white-space:nowrap;box-shadow:none;font-size:11px;">배정 보드 →</a>
            </div>
          </div>

          <!-- 입/퇴실 -->
          <div class="form-row">
            <div><label class="form-label">입실 일시</label><input class="form-control" type="datetime-local" value="2026-03-14T15:00"></div>
            <div><label class="form-label">퇴실 일시</label><input class="form-control" type="datetime-local" value="2026-03-16T11:00"></div>
          </div>

          <!-- 인원 -->
          <div>
            <label class="form-label">인원</label>
            <div style="display:flex;align-items:center;gap:8px;">
              <input class="form-control" style="width:80px;" value="2">
              <span style="font-size:12px;color:var(--gray-400);">최소 1인 / 최대 4인</span>
            </div>
          </div>

        </div>
      </div>

      <!-- 결제 정보 -->
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;">💰 결제 정보</div>
        <div style="background:var(--gray-50);border:1px solid var(--gray-100);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:10px;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;color:var(--gray-500);">총 결제금액</span>
            <span style="font-size:17px;font-weight:800;color:var(--gray-900);">₩560,000</span>
          </div>
          <div style="height:1px;background:var(--gray-200);"></div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;color:var(--gray-500);">결제 수단</span>
            <span style="font-size:13px;font-weight:600;">신용카드</span>
          </div>
        </div>
      </div>

    </div>

    <!-- 푸터 -->
    <div class="modal-footer" style="justify-content:space-between;border-top:1px solid var(--gray-100);">
      <button class="btn btn-outline" style="color:var(--danger);border-color:var(--danger);" onclick="openCancelReasonModal()">예약 취소(거절)</button>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" data-modal-close>닫기</button>
        <button class="btn btn-primary" onclick="showAlert('정보가 저장되었습니다.', {icon:'✅'})">변경사항 저장</button>
      </div>
    </div>

  </div>
</div>



<!-- ── 취소 방식 선택 모달 ── -->
<div class="modal-overlay hidden" id="modalCancelReason">
  <div class="modal modal-sm" style="overflow:hidden;">
    <div style="background:linear-gradient(135deg,#7F1D1D,#991B1B);padding:22px 22px 18px;position:relative;">
      <button class="modal-close" style="position:absolute;top:14px;right:14px;color:rgba(255,255,255,0.5);">×</button>
      <div style="font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:0.1em;font-weight:600;margin-bottom:8px;">예약 취소 방식 선택</div>
      <div style="font-size:15px;font-weight:800;color:#fff;margin-bottom:2px;" id="crResNo"></div>
      <div style="font-size:12px;color:rgba(255,255,255,0.5);" id="crGuestInfo"></div>
    </div>
    <div style="padding:14px 16px 8px;display:flex;flex-direction:column;gap:8px;">

      <!-- 전액 환불 -->
      <button onclick="confirmCancelRefund()"
        style="display:flex;align-items:flex-start;gap:14px;width:100%;padding:16px;background:#FFF1F2;border:1.5px solid #FECDD3;border-radius:12px;cursor:pointer;transition:all 0.15s;text-align:left;"
        onmouseover="this.style.background='#FFE4E6';this.style.borderColor='#FDA4AF';this.style.transform='translateX(2px)'"
        onmouseout="this.style.background='#FFF1F2';this.style.borderColor='#FECDD3';this.style.transform='translateX(0)'">
        <div style="width:38px;height:38px;border-radius:10px;background:#FFE4E6;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E11D48" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:700;color:#E11D48;margin-bottom:4px;">전액 환불 취소 <span style="font-size:11px;font-weight:600;background:#FFE4E6;padding:1px 7px;border-radius:20px;">환불 100%</span></div>
          <div style="font-size:12px;color:#BE123C;line-height:1.6;">예약을 즉시 취소하며 고객에게 <strong>전액 환불</strong> 처리됩니다.</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FDA4AF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <!-- 고객 연락 후 해제 -->
      <button onclick="confirmCancelAgreed()"
        style="display:flex;align-items:flex-start;gap:14px;width:100%;padding:16px;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:12px;cursor:pointer;transition:all 0.15s;text-align:left;"
        onmouseover="this.style.background='#F1F5F9';this.style.borderColor='#CBD5E1';this.style.transform='translateX(2px)'"
        onmouseout="this.style.background='#F8FAFC';this.style.borderColor='#E2E8F0';this.style.transform='translateX(0)'">
        <div style="width:38px;height:38px;border-radius:10px;background:#E2E8F0;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.89 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.8 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 17z"/></svg>
        </div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:700;color:#475569;margin-bottom:4px;">고객 연락 후 해제 <span style="font-size:11px;font-weight:600;background:#E2E8F0;color:#64748B;padding:1px 7px;border-radius:20px;">상호 협의</span></div>
          <div style="font-size:12px;color:#64748B;line-height:1.6;">고객과 연락 후 협의된 해제 — <strong>환불 없음</strong>.<br>오프라인에서 직접 정산되어야 합니다.</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

    </div>
    <div style="padding:8px 16px 16px;">
      <button class="btn btn-ghost" data-modal-close style="width:100%;justify-content:center;border-color:var(--gray-100);color:var(--gray-400);">닫기</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
initPage('partner', 'reservations', '예약 관리');

const resData = [
  { id:'20231015-0001', name:'김철수', phone:'010-1234-5678', room:'스탠다드 더블', assignedRoom: null, checkin:'10.20(월) 15:00', checkout:'10.21(화)', status:'confirmed', guests:2 },
  { id:'20231015-0042', name:'이영훈', phone:'010-9876-5432', room:'디럭스 트윈', assignedRoom: '302호', checkin:'10.22(수) 15:00', checkout:'10.23(목)', status:'confirmed', guests:2 },
  { id:'20231016-0125', name:'박지성', phone:'010-5553-4444', room:'프리미어 스위트', assignedRoom: null, checkin:'10.25(금) 15:00', checkout:'10.27(일)', status:'confirmed', guests:3 },
  { id:'20231017-0031', name:'최유진', phone:'010-7777-8888', room:'계곡뷰 A', assignedRoom: null, checkin:'10.26(토) 15:00', checkout:'10.28(월)', status:'confirmed', guests:2 },
  { id:'20231018-0019', name:'정민수', phone:'010-3333-2222', room:'숲속 B', assignedRoom: '101호', checkin:'10.28(월) 15:00', checkout:'10.29(화)', status:'completed', guests:4 },
  { id:'20231019-0007', name:'한미래', phone:'010-1111-9999', room:'파노라마 C', assignedRoom: null, checkin:'10.29(화) 15:00', checkout:'10.30(수)', status:'cancelled', guests:2 },
  { id:'20231020-0053', name:'강도현', phone:'010-4444-5555', room:'힐링 E', assignedRoom: '505호', checkin:'10.30(수) 15:00', checkout:'11.01(금)', status:'confirmed', guests:2 },
  { id:'20231021-0088', name:'윤지아', phone:'010-6666-7777', room:'하늘 F', assignedRoom: null, checkin:'11.01(금) 15:00', checkout:'11.02(토)', status:'confirmed', guests:3 },
];

const statusMap = {
  confirmed: '<span class="badge badge-confirmed">예약확정</span>',
  using: '<span class="badge badge-using">이용중</span>',
  completed: '<span class="badge badge-completed">이용완료</span>',
  cancelled: '<span class="badge badge-cancelled">취소</span>',
};

function renderReservations() {
  const headEl = document.getElementById('reservationHead');
  const tbodyEl = document.getElementById('reservationRows');
  
  headEl.innerHTML = `
    <tr>
      <th><input type="checkbox"></th>
      <th>예약번호</th>
      <th>예약자 정보</th>
      <th>상품명</th>
      <th>숙박 기간 (입/퇴실)</th>
      <th>관리</th>
    </tr>
  `;

  tbodyEl.innerHTML = resData.map(r => {
    return `
      <tr>
        <td><input type="checkbox"></td>
        <td style="font-size:12px;color:var(--gray-600);font-weight:600">${r.id}</td>
        <td><div style="font-weight:600">${r.name}</div><div style="font-size:11px;color:var(--gray-500)">${r.phone}</div></td>
        <td style="font-weight:600">${r.room}</td>
        <td style="font-size:12px">${r.checkin}<br><span style="color:var(--gray-400)">${r.checkout}</span></td>
        <td><button class="btn btn-outline btn-sm" data-modal="modalDetail">상세</button></td>
      </tr>
    `;
  }).join('');

  document.querySelectorAll('[data-modal]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById(btn.getAttribute('data-modal'))?.classList.remove('hidden');
    });
  });
}

// 초기화 호출
renderReservations();

// 취소 방식 선택 모달
function openCancelReasonModal() {
  const resNoEl = document.querySelector('#modalDetail .form-control[readonly]');
  const nameEl = document.querySelector('#modalDetail #ciName, #modalDetail .form-control[value="김철수"]');
  const resNo = resNoEl ? resNoEl.value : 'REV-20231024-00892';
  const guestName = '김철수'; // 데모데이터

  document.getElementById('crResNo').textContent = resNo;
  document.getElementById('crGuestInfo').textContent = guestName + ' 님 · 스탠다드 더블';
  document.getElementById('modalCancelReason').classList.remove('hidden');
}

function confirmCancelRefund() {
  document.getElementById('modalCancelReason').classList.add('hidden');
  document.getElementById('modalDetail').classList.add('hidden');
  showConfirm(
    '예약을 일괄 취소 처리하시겠습니까?\n고객에게 전액 환불 처리됩니다.',
    () => showAlert('취소 처리가 완료되었습니다.\n고객에게 전액 환불 처리되었습니다.', { icon: '✅', title: '예약 취소 완료' }),
    { confirmText: '취소 확정', confirmClass: 'btn-danger', icon: '⚠️' }
  );
}

function confirmCancelAgreed() {
  document.getElementById('modalCancelReason').classList.add('hidden');
  document.getElementById('modalDetail').classList.add('hidden');
  showConfirm(
    '고객 연락 후 해제 처리하시겠습니까?\n환불 없이 예약이 해제되며, 오프라인에서 고객과 직접 정산되어야 합니다.',
    () => showAlert('예약 해제 처리가 완료되었습니다.\n오프라인 정산을 진행해 주세요.', { icon: '✅', title: '해제 완료' }),
    { confirmText: '해제 확정', confirmClass: 'btn-primary', icon: '📞' }
  );
}

document.querySelectorAll('.modal-close, [data-modal-close]').forEach(btn => {
  btn.addEventListener('click', () => btn.closest('.modal-overlay')?.classList.add('hidden'));
});
</script>
</body>
</html>
