<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시스템 설정 — Super Admin</title>
<link rel="stylesheet" href="shared.css">
<style>
.settings-layout { display: grid; grid-template-columns: 200px 1fr; gap: 20px; align-items: start; }
.settings-nav { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; position: sticky; top: 80px; }
.settings-nav-item { padding: 13px 18px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--gray-600); border-left: 3px solid transparent; transition: all 0.15s; }
.settings-nav-item:hover { background: var(--gray-50); color: var(--gray-900); }
.settings-nav-item.active { background: #EDE9FE; color: #4338CA; border-left-color: #6366F1; font-weight: 700; }
.settings-nav-section { padding: 10px 18px 4px; font-size: 10px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.08em; }
.section-block { background: #fff; border-radius: var(--radius-lg); padding: 22px 24px; box-shadow: var(--shadow-sm); margin-bottom: 16px; }
.section-block-title { font-size: 15px; font-weight: 700; color: var(--gray-800); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.section-block-sub { font-size: 12px; color: var(--gray-400); margin-bottom: 20px; }
.rate-display { background: linear-gradient(135deg, #6366F1, #818CF8); border-radius: var(--radius-lg); padding: 20px 24px; color: #fff; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.rate-display .rate-num { font-size: 40px; font-weight: 800; letter-spacing: -1px; }
.rate-display .rate-label { font-size: 12px; opacity: 0.8; margin-bottom: 4px; }
.rate-display .rate-meta { font-size: 12px; opacity: 0.7; margin-top: 6px; }
.apply-month-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
.apply-month-hint { font-size: 12px; color: var(--gray-400); margin-top: 6px; }
.history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.history-table th { text-align: left; padding: 8px 12px; background: var(--gray-50); color: var(--gray-500); font-size: 11px; font-weight: 700; }
.history-table td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); }
.history-table tr:last-child td { border-bottom: none; }
.rate-badge { display: inline-flex; align-items: center; gap: 6px; font-weight: 700; }
.rate-badge .arrow { color: var(--gray-400); }
.notice-preview { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 16px; font-size: 13px; color: var(--gray-700); line-height: 1.9; }
.notice-preview .np-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; background: #EDE9FE; color: #4338CA; margin-bottom: 10px; }
.notice-preview .np-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--gray-900); }
.channel-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--gray-100); font-size: 13px; }
.channel-row:last-child { border-bottom: none; }
.channel-icon { font-size: 18px; width: 28px; text-align: center; }
.channel-info { flex: 1; }
.channel-title { font-weight: 600; }
.channel-desc { font-size: 11px; color: var(--gray-400); }
</style>
</head>
<body>
<div class="layout">
  <div class="main">
    <header class="header">
      <div class="header-left"><div class="header-title">시스템 설정</div></div>
      <div class="header-right">
        <div class="header-date"></div>
        <div class="avatar" style="background:#6366F1">A</div>
      </div>
    </header>
    <div class="page">
      <div class="page-header">
        <div class="page-header-left">
          <div class="page-title">시스템 설정</div>
          <div class="page-subtitle">플랫폼 전체에 적용되는 정책과 자동화 설정을 관리합니다.</div>
        </div>
      </div>

      <div class="settings-layout">
        <!-- Left Nav -->
        <div class="settings-nav">
          <div class="settings-nav-section">수수료</div>
          <div class="settings-nav-item active" onclick="showTab('fee')">💰 수수료 정책</div>
          <div class="settings-nav-item" onclick="showTab('notice')">🔔 자동 공지 설정</div>
          <div class="settings-nav-section">기타</div>
          <div class="settings-nav-item" onclick="showTab('etc')">⚙️ 기타 설정</div>
        </div>

        <!-- Content -->
        <div>

          <!-- ── Tab: 기타 ── -->
          <div id="tab-etc">
            <div class="section-block">
              <div class="section-block-title">⚙️ 기타 시스템 설정</div>
              <div class="section-block-sub">추후 확장 예정인 정책 설정입니다.</div>
              <div style="padding:40px;text-align:center;color:var(--gray-400)">
                <div style="font-size:36px;margin-bottom:12px">🚧</div>
                <div style="font-size:14px;font-weight:600">준비 중</div>
                <div style="font-size:12px;margin-top:4px">정산 주기, 환불 정책 등이 추가될 예정입니다.</div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
initPage('admin', 'syssettings', '시스템 설정');

function showTab(id) {
  ['etc'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== id);
  });
  document.querySelectorAll('.settings-nav-item').forEach((el, i) => {
    el.classList.toggle('active', ['etc'][i] === id);
  });
}
</script>
</body>
</html>
