<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인 — Super Admin</title>
<link rel="stylesheet" href="shared.css">
<style>
.auth-page { background: linear-gradient(135deg, #0F172A 0%, #1E293B 60%, #0F172A 100%); }
.auth-card { border-top: 4px solid #6366F1; }
.auth-logo .logo { color: #818CF8; }
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:36px;margin-bottom:8px">🏢</div>
      <div class="logo">Hotel Admin Console</div>
      <div class="sub">슈퍼 어드민 — 플랫폼 운영 관리</div>
    </div>
    <div class="alert alert-info" style="margin-bottom:20px">
      🔒 이 페이지는 플랫폼 운영 담당자 전용입니다.
    </div>
    <div class="form-group">
      <label class="form-label">관리자 이메일</label>
      <input type="email" class="form-control" value="admin@hotelplatform.kr">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input type="password" class="form-control" value="••••••••">
    </div>

    <a href="admin-dashboard.html">
      <button class="btn btn-full btn-lg" style="background:#6366F1;color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:15px;font-weight:700;padding:14px">관리자 로그인</button>
    </a>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--gray-200);text-align:center">
      <a href="partner-login.html" style="font-size:12px;color:var(--gray-400)">파트너 포털로 이동 →</a>
    </div>
  </div>
</div>
</body>
</html>
