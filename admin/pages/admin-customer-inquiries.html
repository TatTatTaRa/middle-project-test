<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고객 문의 — Super Admin</title>
<link rel="stylesheet" href="shared.css">
<style>
.inq-layout {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 0;
  height: calc(100vh - 64px);
  overflow: hidden;
}
.inq-list-panel {
  border-right: 1px solid var(--gray-200);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #fff;
}
.inq-list-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  gap: 8px;
}
.inq-search {
  flex: 1;
  padding: 7px 12px;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  font-size: 13px;
  outline: none;
}
.inq-search:focus { border-color: #6366F1; }
.inq-filter { display: flex; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--gray-200); flex-wrap: wrap; }
.filter-chip {
  padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--gray-200); background: #fff; cursor: pointer; color: var(--gray-600);
  transition: all 0.15s;
}
.filter-chip.active { background: #6366F1; color: #fff; border-color: #6366F1; }
.inq-list { flex: 1; overflow-y: auto; }
.inq-item {
  padding: 14px 16px;
  border-bottom: 1px solid var(--gray-100);
  cursor: pointer;
  transition: background 0.1s;
}
.inq-item:hover, .inq-item.active { background: #EEF2FF; }
.inq-item-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.inq-name { font-size: 13px; font-weight: 700; color: var(--gray-800); }
.inq-time { font-size: 11px; color: var(--gray-400); margin-left: auto; }
.inq-subject { font-size: 13px; color: var(--gray-700); margin-bottom: 3px; font-weight: 600; }
.inq-preview { font-size: 12px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dot-unread { width: 7px; height: 7px; border-radius: 50%; background: #6366F1; flex-shrink: 0; }
.cat-badge {
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; flex-shrink: 0;
}
.cat-refund   { background: #FEE2E2; color: #DC2626; }
.cat-booking  { background: #DBEAFE; color: #1D4ED8; }
.cat-etc      { background: var(--gray-100); color: var(--gray-600); }
.cat-complaint{ background: #FEF3C7; color: #92400E; }
.status-badge-new  { background: #EDE9FE; color: #6366F1; font-size:10px; font-weight:700; padding:2px 7px; border-radius:99px; }
.status-badge-done { background: var(--gray-100); color: var(--gray-500); font-size:10px; font-weight:700; padding:2px 7px; border-radius:99px; }

/* 우측 채팅 */
.inq-chat-panel {
  display: flex; flex-direction: column; overflow: hidden; background: #F8FAFC;
}
.inq-chat-header {
  padding: 14px 20px; background: #fff; border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; gap: 12px;
}
.inq-chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.msg-row { display: flex; gap: 10px; }
.msg-row.me { flex-direction: row-reverse; }
.msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.msg-bubble { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
.msg-bubble.customer { background: #fff; border: 1px solid var(--gray-200); color: var(--gray-800); border-radius: 2px 12px 12px 12px; }
.msg-bubble.admin    { background: #6366F1; color: #fff; border-radius: 12px 2px 12px 12px; }
.msg-time { font-size: 10px; color: var(--gray-400); align-self: flex-end; flex-shrink: 0; }
.inq-chat-input { padding: 12px 16px; background: #fff; border-top: 1px solid var(--gray-200); display: flex; gap: 10px; align-items: flex-end; }
.inq-textarea { flex: 1; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 9px 12px; font-size: 13px; resize: none; outline: none; min-height: 40px; max-height: 120px; font-family: inherit; }
.inq-textarea:focus { border-color: #6366F1; }
.inq-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gray-400); gap: 12px; }
</style>
</head>
<body>
<div class="layout">
  <div class="main" style="display:flex;flex-direction:column;padding:0;">
    <header class="header" style="flex-shrink:0">
      <div class="header-left"><div class="header-title">고객 문의</div></div>
      <div class="header-right">
        <div class="header-date"></div>
        <div class="avatar" style="background:#6366F1">A</div>
      </div>
    </header>

    <div class="inq-layout">
      <!-- 왼쪽 목록 -->
      <div class="inq-list-panel">
        <div class="inq-list-header">
          <input type="text" class="inq-search" placeholder="고객명 또는 문의 내용 검색...">
        </div>
        <div class="inq-filter" id="filterBar">
          <div class="filter-chip active" onclick="setFilter('all', this)">전체</div>
          <div class="filter-chip" onclick="setFilter('new', this)">미답변</div>
          <div class="filter-chip" onclick="setFilter('refund', this)">환불</div>
          <div class="filter-chip" onclick="setFilter('booking', this)">예약</div>
          <div class="filter-chip" onclick="setFilter('complaint', this)">불만</div>
          <div class="filter-chip" onclick="setFilter('etc', this)">기타</div>
        </div>
        <div class="inq-list" id="inqList"></div>
      </div>

      <!-- 오른쪽 채팅 -->
      <div class="inq-chat-panel" id="chatPanel">
        <div class="inq-empty" id="emptyState">
          <div style="font-size:48px">💬</div>
          <div style="font-weight:600;color:var(--gray-600)">문의를 선택해주세요</div>
          <div style="font-size:12px">고객의 문의 내용을 확인하고 답변할 수 있습니다.</div>
        </div>
        <div id="chatView" style="display:none;flex:1;flex-direction:column;overflow:hidden">
          <div class="inq-chat-header" id="chatHeader"></div>
          <div class="inq-chat-body" id="chatBody"></div>
          <div class="inq-chat-input">
            <textarea class="inq-textarea" id="replyInput" rows="1" placeholder="답변을 입력하세요..."></textarea>
            <button class="btn btn-sm" style="background:#6366F1;color:#fff;border:none;padding:9px 16px;flex-shrink:0" onclick="sendReply()">전송</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
initPage('admin', 'customer-inquiries', '고객 문의');

const INQ_DATA = [
  {
    id: 1, name: '김철수', email: 'kim@example.com', status: 'new',
    category: 'refund', catLabel: '환불', catCls: 'cat-refund',
    subject: '예약 취소 후 환불 미입금',
    preview: '3월 10일에 예약 취소했는데 아직 환불이 안 됩니다.',
    time: '5분 전',
    messages: [
      { from: 'customer', text: '안녕하세요. 3월 10일에 예약을 취소했는데 아직 환불이 되지 않았습니다.\n확인해주실 수 있을까요?', time: '09:05' },
      { from: 'customer', text: '예약번호는 RES-20260310-0042입니다.', time: '09:06' },
    ]
  },
  {
    id: 2, name: '이영희', email: 'lee@example.com', status: 'new',
    category: 'booking', catLabel: '예약', catCls: 'cat-booking',
    subject: '체크인 시간 변경 가능한지 문의',
    preview: '오후 2시 체크인인데 오전 11시로 변경 가능한가요?',
    time: '30분 전',
    messages: [
      { from: 'customer', text: '예약한 숙소 체크인 시간이 오후 2시인데, 오전 11시로 변경이 가능한지 확인하고 싶습니다.', time: '08:35' },
    ]
  },
  {
    id: 3, name: '박민준', email: 'park@example.com', status: 'new',
    category: 'complaint', catLabel: '불만', catCls: 'cat-complaint',
    subject: '숙소 청결도 불만 및 보상 요청',
    preview: '객실이 너무 더럽고 냄새가 났습니다. 보상을 요청합니다.',
    time: '1시간 전',
    messages: [
      { from: 'customer', text: '지난 주말 이용한 숙소 객실이 청소가 전혀 되어있지 않았고 심한 냄새가 났습니다.', time: '08:10' },
      { from: 'customer', text: '이에 대한 부분 환불 또는 다른 보상을 요청드립니다. 사진도 찍어두었습니다.', time: '08:11' },
    ]
  },
  {
    id: 4, name: '최지연', email: 'choi@example.com', status: 'done',
    category: 'booking', catLabel: '예약', catCls: 'cat-booking',
    subject: '예약 내역 확인 방법',
    preview: '답변 감사드립니다!',
    time: '어제',
    messages: [
      { from: 'customer', text: '예약 내역을 어디서 확인할 수 있나요?', time: '어제 13:00' },
      { from: 'admin', text: '안녕하세요, 고객님! 예약 내역은 앱 > 내 예약 메뉴에서 확인하실 수 있습니다.\n추가 문의사항이 있으시면 언제든지 말씀해주세요.', time: '어제 13:20' },
      { from: 'customer', text: '답변 감사드립니다!', time: '어제 13:25' },
    ]
  },
  {
    id: 5, name: '한동욱', email: 'han@example.com', status: 'done',
    category: 'etc', catLabel: '기타', catCls: 'cat-etc',
    subject: '쿠폰 적용 오류',
    preview: '문제가 해결되었습니다. 감사합니다.',
    time: '어제',
    messages: [
      { from: 'customer', text: '쿠폰 코드를 입력했는데 적용이 안 됩니다.', time: '어제 10:00' },
      { from: 'admin', text: '안녕하세요! 해당 쿠폰은 3월 15일까지 유효한 쿠폰으로 현재 만료된 상태입니다.\n이전 미적용된 쿠폰에 대해 동일한 혜택을 새 쿠폰으로 발급해드리겠습니다.', time: '어제 10:30' },
      { from: 'customer', text: '문제가 해결되었습니다. 감사합니다.', time: '어제 10:45' },
    ]
  },
];

let currentFilter = 'all';
let selectedId = null;

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  let data = INQ_DATA;
  if (currentFilter === 'new') data = data.filter(d => d.status === 'new');
  else if (currentFilter !== 'all') data = data.filter(d => d.category === currentFilter);

  document.getElementById('inqList').innerHTML = data.map(d => `
    <div class="inq-item${selectedId === d.id ? ' active' : ''}" onclick="openChat(${d.id})">
      <div class="inq-item-top">
        ${d.status === 'new' ? '<div class="dot-unread"></div>' : ''}
        <div class="inq-name">${d.name}</div>
        <span class="cat-badge ${d.catCls}">${d.catLabel}</span>
        <span class="${d.status === 'new' ? 'status-badge-new' : 'status-badge-done'}">${d.status === 'new' ? '미답변' : '답변완료'}</span>
        <div class="inq-time">${d.time}</div>
      </div>
      <div class="inq-subject">${d.subject}</div>
      <div class="inq-preview">${d.preview}</div>
    </div>
  `).join('') || '<div style="padding:30px;text-align:center;color:var(--gray-400);font-size:13px">문의가 없습니다.</div>';
}

function openChat(id) {
  selectedId = id;
  const inq = INQ_DATA.find(d => d.id === id);
  renderList();

  document.getElementById('emptyState').style.display = 'none';
  const chatView = document.getElementById('chatView');
  chatView.style.display = 'flex';

  document.getElementById('chatHeader').innerHTML = `
    <div style="font-size:20px">👤</div>
    <div style="flex:1">
      <div style="font-size:15px;font-weight:700">${inq.name} <span style="font-size:12px;color:var(--gray-400);font-weight:400">${inq.email}</span></div>
      <div style="font-size:12px;color:var(--gray-500);display:flex;gap:6px;align-items:center;margin-top:2px">
        <span class="cat-badge ${inq.catCls}">${inq.catLabel}</span>
        ${inq.subject}
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="markDone(${id})">답변 완료 처리</button>
  `;

  document.getElementById('chatBody').innerHTML = inq.messages.map(m => `
    <div class="msg-row ${m.from === 'admin' ? 'me' : ''}">
      <div class="msg-avatar" style="background:${m.from === 'admin' ? '#EDE9FE' : '#DBEAFE'}">${m.from === 'admin' ? '🏢' : '👤'}</div>
      <div class="msg-bubble ${m.from === 'admin' ? 'admin' : 'customer'}">${m.text.replace(/\n/g, '<br>')}</div>
      <div class="msg-time">${m.time}</div>
    </div>
  `).join('');

  const body = document.getElementById('chatBody');
  body.scrollTop = body.scrollHeight;
}

function sendReply() {
  const input = document.getElementById('replyInput');
  const text = input.value.trim();
  if (!text || !selectedId) return;

  const inq = INQ_DATA.find(d => d.id === selectedId);
  inq.messages.push({ from: 'admin', text, time: '방금' });
  inq.status = 'done';
  inq.preview = text.substring(0, 30) + (text.length > 30 ? '...' : '');
  input.value = '';
  openChat(selectedId);
  renderList();
}

function markDone(id) {
  const inq = INQ_DATA.find(d => d.id === id);
  if (inq.status === 'done') { showAlert('이미 답변 완료 처리된 문의입니다.', {icon:'ℹ️'}); return; }
  inq.status = 'done';
  openChat(id);
  renderList();
  showAlert('답변 완료 처리되었습니다.', { icon: '✅' });
}

renderList();
</script>
</body>
</html>
